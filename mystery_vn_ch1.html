          // 계속 버튼 콜백 교체
          const _afterNotify = _allLeafDone ? () => {
            document.getElementById('interrogate-wrap').style.display = 'none';
            document.getElementById('textbox').style.visibility = '';
            renderScene('iq_sh_final_1');
          } : () => interrogateWrapShow();
          floatBtn.textContent = '▶ 계속';
          floatBtn.className = '';
          floatBtn._cb = _afterNotify;
        } else if (_allLeafDone) {
          document.getElementById('interrogate-wrap').style.display = 'none';
          document.getElementById('textbox').style.visibility = '';
          renderScene('iq_sh_final_1');
        } else {
          interrogateWrapShow();
        }
      };
    } else if (s.type === 'iq_conflict_end') {
      // 갈등 답변 마지막 — 잠깐 대기 후 자동으로 다음 씬 전환
      floatBtn.className = 'hidden';
      setTimeout(() => {
        // 미수집 항목 기록
        (IQ_TOPICS[currentInterrogateTarget] || []).forEach(t => {
          if (!interrogateDone[t.topicId]) interrogateSkipped[currentInterrogateTarget].add(t.topicId);
        });
        document.getElementById('interrogate-wrap').style.display = 'none';
        document.getElementById('interrogate-divider').classList.remove('active');
        renderScene(s.next);
      }, 1800);
    } else if (s.type === 'chapter_title') {
      isTransitioning = false;
      // 장 타이틀 중 슬라이더 닫기
      ['casefile-panel','evidence-panel','log-panel'].forEach(id => {
        document.getElementById(id).classList.remove('open');
      });
      // 브금 페이드아웃
      fadeBGM(2000);
      // 패널 전체 닫기
      ['log-panel','evidence-panel','casefile-panel'].forEach(id => {
        document.getElementById(id).classList.remove('open');
      });
      // 대화창/버튼 숨기고 장 타이틀 오버레이 표시
      const textbox = document.getElementById('textbox');
      const charLayer = document.getElementById('char-layer');
      const cto = document.getElementById('chapter-title-overlay');
      textbox.style.visibility = 'hidden';
      charLayer.style.visibility = 'hidden';
      const numEl  = document.getElementById('chapter-title-num');
      const mainEl = document.getElementById('chapter-title-main');
      const subEl  = document.getElementById('chapter-title-sub');
      numEl.textContent  = s.chapterNum  || '';
      mainEl.textContent = s.chapterMain || '';
      subEl.textContent  = s.chapterSub  || '';
      // 초기 상태 리셋
      numEl.style.animation  = 'none';
      mainEl.style.animation = 'none';
      numEl.style.opacity    = '0';
      mainEl.style.opacity   = '0';
      cto.style.transition   = 'none';
      cto.style.opacity      = '0';
      cto.style.display      = 'flex';
      void cto.offsetWidth;
      // 배경 페이드인
      cto.style.transition = 'opacity 1.0s ease';
      cto.style.opacity    = '1';
      cto.style.pointerEvents = 'all';
      // 상단 텍스트 슬라이드다운 (0.6s 후)
      setTimeout(() => {
        numEl.style.animation = 'ctNumSlideDown 1.2s cubic-bezier(0.22,1,0.36,1) forwards';
      }, 600);
      // 메인 타이틀 스케일업 (1.4s 후)
      setTimeout(() => {
        mainEl.style.animation = 'ctMainScaleUp 1.8s cubic-bezier(0.22,1,0.36,1) forwards';
      }, 2200);
      // 삼각형 애니메이션
      const canvas = document.getElementById('chapter-title-canvas');
      const ctx2d = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const W = canvas.width, H = canvas.height;
      const triSize = Math.min(W, H) * 0.38; // 삼각형 크기
      let triProgress = 0; // 0→1
      let triAnim = null;
      const triStartTime = performance.now() + 1800; // 메인 타이틀 등장 후
      function drawTri(progress) {
        ctx2d.clearRect(0, 0, W, H);
        // shadow/glow 완전 제거
        ctx2d.shadowBlur = 0;
        ctx2d.shadowColor = 'transparent';
        const p = 1 - Math.pow(1 - Math.min(progress, 1), 3);
        // 가로로 납작한 삼각형: 가로 = 화면 너비, 세로 = 화면 높이 * 0.6
        const triW = W * 0.85;
        const triH = H * 0.5;
        const slideAmt = triW * 0.22 * (1 - p);

        // 왼쪽 아래: (0, H) 기준 우측으로 triW, 위로 triH
        const lb_x = -slideAmt;
        const lb_y = H + slideAmt * 0.5;
        const grad1 = ctx2d.createLinearGradient(lb_x + triW * 0.7, lb_y - triH * 0.7, lb_x, lb_y);
        grad1.addColorStop(0, 'rgba(148,136,200,0.22)');
        grad1.addColorStop(0.6, 'rgba(148,136,200,0.08)');
        grad1.addColorStop(1, 'rgba(148,136,200,0.0)');
        ctx2d.beginPath();
        ctx2d.moveTo(lb_x, lb_y);
        ctx2d.lineTo(lb_x + triW, lb_y);
        ctx2d.lineTo(lb_x, lb_y - triH);
        ctx2d.closePath();
        ctx2d.fillStyle = grad1;
        ctx2d.fill();

        // 오른쪽 위: (W, 0) 기준 좌측으로 triW, 아래로 triH
        const rt_x = W + slideAmt;
        const rt_y = -slideAmt * 0.5;
        const grad2 = ctx2d.createLinearGradient(rt_x - triW * 0.7, rt_y + triH * 0.7, rt_x, rt_y);
        grad2.addColorStop(0, 'rgba(148,136,200,0.22)');
        grad2.addColorStop(0.6, 'rgba(148,136,200,0.08)');
        grad2.addColorStop(1, 'rgba(148,136,200,0.0)');
        ctx2d.beginPath();
        ctx2d.moveTo(rt_x, rt_y);
        ctx2d.lineTo(rt_x - triW, rt_y);
        ctx2d.lineTo(rt_x, rt_y + triH);
        ctx2d.closePath();
        ctx2d.fillStyle = grad2;
        ctx2d.fill();
      }
      function animTri(now) {
        const elapsed = now - triStartTime;
        if (elapsed < 0) { triAnim = requestAnimationFrame(animTri); return; }
        triProgress = elapsed / 1200; // 1.2초에 걸쳐 이동
        drawTri(triProgress);
        if (triProgress < 1) triAnim = requestAnimationFrame(animTri);
      }
      triAnim = requestAnimationFrame(animTri);

      // 5초 후 페이드 아웃 → 다음 씬
      setTimeout(() => {
        cto.style.transition = 'opacity 1.2s ease';
        cto.style.opacity = '0';
        setTimeout(() => {
          cto.style.display = 'none';
          cto.style.pointerEvents = 'none';
          textbox.style.visibility = '';
          charLayer.style.visibility = '';
          if (triAnim) cancelAnimationFrame(triAnim);
          ctx2d.clearRect(0, 0, W, H);
          renderScene(s.next);
        }, 1200);
      }, 5000);
    } else if (s.type === 'wip') {
      // 작업 중 — 처음부터 버튼만 표시
      floatBtn.textContent = '↺ 처음부터';
      floatBtn.className = '';
      floatBtn._cb = () => doRestart();
    } else if (s.type === 'show_image') {
      playUISlash();
      const nextScene = s.next;
      document.getElementById('img-lightbox-img').src = s.imgSrc;
      const lb = document.getElementById('img-lightbox');
      lb.classList.add('open');
      // 텍스트박스·캐릭터 유지 — floatBtn만 숨김
      floatBtn.className = 'hidden';
      const closeAndNext = () => {
        lb.classList.remove('open');
        lb.removeEventListener('click', onBgClick);
        document.getElementById('img-lightbox-close').onclick = () => closeLightbox();
        setTimeout(() => { renderScene(nextScene); }, 50);
      };
      const onBgClick = (e) => { if (e.target === lb) closeAndNext(); };
      lb.addEventListener('click', onBgClick);
      document.getElementById('img-lightbox-close').onclick = (e) => { e.stopPropagation(); closeAndNext(); };
    } else if (s.type === 'restart') {
      if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
      document.getElementById('dialogue-text').innerHTML = '';
      document.getElementById('textbox').style.visibility = 'hidden';
      document.getElementById('continue-btn-float').className = 'hidden';
      if (isLoadedSave) {
        isLoadedSave = false;
        document.getElementById('restart-modal').classList.add('open');
        showWorkInProgress();
      } else {
        document.getElementById('restart-modal').classList.add('open');
      }
    }
  };

  // 배경이 바뀌면 기존 캐릭터를 fade-out하고 prevCharX 초기화
  // (currentBg 갱신 전에 비교해야 하므로 s.bg와 비교)
  const bgChanging = currentBg !== s.bg;
  if (bgChanging) {
    const layer = document.getElementById('char-layer');
    layer.innerHTML = '';
    Object.keys(_prevCharX).forEach(k => delete _prevCharX[k]);
    // 엘리베이터 배경 벗어나면 루프 정지
    if (typeof stopElevatorMove === 'function' && s.bg !== BG.ele) stopElevatorMove();
  }
  currentBg = s.bg;
  bgLayer.style.background = s.bg;
  bgLayer.style.backgroundSize = 'cover';
  bgLayer.style.backgroundPosition = 'center center';
  bgLayer.style.backgroundRepeat = 'no-repeat';

  if (needsDelay) {
    isTransitioning = true;
    setTimeout(() => { isTransitioning = false; applyContent(); }, 500);
  } else {
    applyContent();
  }
}

// 신문창 토픽 버튼 렌더링
// 선택지 레이블에 키워드 하이라이트 적용 (선택지 전용)
const IQ_LABEL_KEYWORDS = [
  { words: ['동아리', '보라', '하늘', '세빈'], color: '#86efac' },
];
function applyIqLabelHighlight(label, hlLabel) {
  // _hlLabel이 있으면 그 부분만 녹색으로
  if (hlLabel) {
    return label.replace(hlLabel, `<span class="iq-label-kw" style="color:#86efac">${hlLabel}</span>`);
  }
  let result = label;
  IQ_LABEL_KEYWORDS.forEach(rule => {
    rule.words.forEach(word => {
      result = result.replace(new RegExp(word, 'g'),
        `<span class="iq-label-kw" style="color:${rule.color}">${word}</span>`);
    });
  });
  return result;
}

// 민들레 파티클 효과
function spawnDandelionParticles(btn) {
  // interrogate-wrap은 항상 left:50% top:50% translate(-50%,-50%)
  // wrap 내부에서 btn의 offset 위치를 더해 viewport 기준 좌표 계산
  const wrap = document.getElementById('interrogate-wrap');
  const wrapW = wrap ? wrap.offsetWidth : 0;
  const wrapH = wrap ? wrap.offsetHeight : 0;
  const wrapLeft = window.innerWidth / 2 - wrapW / 2;
  const wrapTop  = window.innerHeight / 2 - wrapH / 2;
  let ox = 0, oy = 0, el = btn;
  while (el && el !== wrap) { ox += el.offsetLeft; oy += el.offsetTop; el = el.offsetParent; }
  const cx = wrapLeft + ox + btn.offsetWidth / 2;
  const cy = wrapTop  + oy + btn.offsetHeight / 2;

  const canvas = document.createElement('canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const pts = [];
  const count = 18;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const spd = 18 + Math.random() * 32;
    const size = 2 + Math.random() * 3;
    pts.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 8,
      size,
      drift: (Math.random() - 0.5) * 1.2,
    });
  }

  const start = performance.now(), dur = 650;
  function draw(now) {
    const t = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 2);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pts.forEach(p => {
      const alpha = Math.max(0, 1 - t * 1.3);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#86efac';
      ctx.beginPath();
      ctx.ellipse(
        p.x + p.vx * ease + p.drift * ease * 20,
        p.y + p.vy * ease + 30 * ease * ease,
        p.size * 0.5, p.size * 1.8,
        Math.atan2(p.vy, p.vx),
        0, Math.PI * 2
      );
      ctx.fill();
      ctx.restore();
    });
    if (t < 1) requestAnimationFrame(draw);
    else canvas.remove();
  }
  requestAnimationFrame(draw);
}

// 이전 렌더링 시 해금됐던 토픽 추적
let _prevUnlockedTopics = new Set();

function renderInterrogateTopics(animate) {
  _choiceIdx = -1;
  const list = document.getElementById('interrogate-topic-list');
  const topics = IQ_TOPICS[currentInterrogateTarget] || [];
  const existingBtns = {};
  [...list.querySelectorAll('.iq-topic-btn')].forEach(btn => {
    existingBtns[btn.dataset.topicId] = btn;
  });

  const newTopics = topics.filter(t =>
    !t._alwaysLocked && _unlockedTopics.has(t.topicId) && !_prevUnlockedTopics.has(t.topicId) && !interrogateDone[t.topicId]
  );

  // 새로 해금된 항목에 연결된 _alwaysLocked 버튼도 함께 추가
  const newAlwaysLocked = topics.filter(t => {
    if (!t._alwaysLocked) return false;
    const parentId = t.parentTopicId || t.topicId.replace('_locked', '');
    // parent 토픽이 완료된 직후에만 등장 (_pendingDoneTopicId 기준)
    return _pendingDoneTopicId === parentId && !existingBtns[t.topicId];
  });

  if (animate) {
    // done된 버튼 — 제자리에서 파티클 후 제거 (DOM 유지)
    if (_pendingDoneTopicId) {
      const doneBtn = existingBtns[_pendingDoneTopicId];
      if (doneBtn) {
        doneBtn.style.pointerEvents = 'none';
        setTimeout(() => {
          spawnDandelionParticles(doneBtn);
          doneBtn.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          doneBtn.style.opacity = '0';
          doneBtn.style.transform = 'translateY(-12px)';
          setTimeout(() => {
            doneBtn.remove();
            // 완료된 토픽에 lockedAfter가 있으면 잠긴 버튼 추가
            const doneTopic = topics.find(t => t.topicId === _pendingDoneTopicId);
            if (doneTopic && doneTopic.lockedLabel) {
              const lBtn = document.createElement('button');
              lBtn.className = 'iq-topic-btn locked sliding-in';
              lBtn.dataset.topicId = _pendingDoneTopicId + '_locked';
              lBtn.innerHTML = doneTopic.lockedLabel + '<span class="locked-hint">(잠김.)</span>';
              list.appendChild(lBtn);
            }
          }, 420);
        }, 80);
      }
      _pendingDoneTopicId = null;
    }

    // 새로 해금된 버튼 — 맨 아래에 슬라이드업으로 추가
    newTopics.forEach((topic, i) => {
      const btn = document.createElement('button');
      btn.className = 'iq-topic-btn';
      btn.dataset.topicId = topic.topicId;
      btn.innerHTML = applyIqLabelHighlight(topic.label, topic._hlLabel);
      btn.onclick = () => selectInterrogateTopic(topic);
      btn.style.opacity = '0';
      list.appendChild(btn);
      setTimeout(() => {
        btn.classList.add('sliding-in');
        btn.style.opacity = '';
      }, 550 + i * 100);
    });
    // 새로 해금된 항목에 연결된 잠긴 버튼 추가
    newAlwaysLocked.forEach((topic, i) => {
      const lBtn = document.createElement('button');
      lBtn.className = 'iq-topic-btn locked';
      lBtn.dataset.topicId = topic.topicId;
      lBtn.innerHTML = applyIqLabelHighlight(topic.label, topic._hlLabel) + '<span class="locked-hint">(잠김.)</span>';
      lBtn.style.opacity = '0';
      list.appendChild(lBtn);
      setTimeout(() => {
        lBtn.classList.add('sliding-in');
        lBtn.style.opacity = '';
      }, 550 + (newTopics.length + i) * 100);
    });
  } else {
    // 첫 진입 — 애니메이션 없이 바로 렌더링
    list.innerHTML = '';
    topics.forEach(topic => {
      if (topic._alwaysLocked) {
        // 항상 잠긴 버튼 — parent 토픽이 완료됐을 때만 표시
        const parentId = topic.parentTopicId || topic.topicId.replace('_locked', '');
        if (!interrogateDone[parentId]) return;
        const lBtn = document.createElement('button');
        lBtn.className = 'iq-topic-btn locked';
        lBtn.dataset.topicId = topic.topicId;
        lBtn.innerHTML = applyIqLabelHighlight(topic.label, topic._hlLabel) + '<span class="locked-hint">(잠김.)</span>';
        list.appendChild(lBtn);
        return;
      }
      if (!_unlockedTopics.has(topic.topicId)) return;
      const btn = document.createElement('button');
      btn.className = 'iq-topic-btn' + (interrogateDone[topic.topicId] ? ' done' : '');
      btn.dataset.topicId = topic.topicId;
      btn.innerHTML = applyIqLabelHighlight(topic.label, topic._hlLabel);
      if (!interrogateDone[topic.topicId]) btn.onclick = () => selectInterrogateTopic(topic);
      list.appendChild(btn);
      // 완료된 토픽에 lockedAfter 잠긴 버튼
      if (interrogateDone[topic.topicId] && topic.lockedLabel) {
        const lBtn = document.createElement('button');
        lBtn.className = 'iq-topic-btn locked';
        lBtn.dataset.topicId = topic.topicId + '_locked';
        lBtn.textContent = topic.lockedLabel;
        list.appendChild(lBtn);
      }
    });
  }

  _prevUnlockedTopics = new Set(_unlockedTopics);
}

// 현재 재생 중인 토픽 ID 추적
let _currentIqTopicId = null;

// 토픽 버튼 클릭 처리
// 방금 완료된 topicId — wrap이 열릴 때 파티클 실행용
let _pendingDoneTopicId = null;

function selectInterrogateTopic(topic) {
  const scenes = INTERROGATE_SCENES[currentInterrogateTarget]?.[topic.topicId];
  if (!scenes || scenes.length === 0) return;

  _currentIqTopicId = topic.topicId;
  interrogateDone[topic.topicId] = true;
  _pendingDoneTopicId = topic.topicId;

  interrogateWrapHide(() => {
    renderScene(scenes[0].id);
  });
}

// 씬 재생 후 토픽 해금 처리 (iq_answer_end 타입에서 호출)
function unlockInterrogateTopics(topicId) {
  const topics = IQ_TOPICS[currentInterrogateTarget] || [];
  const topic = topics.find(t => t.topicId === topicId);
  if (!topic) return;
  topic.unlocks.forEach(id => _unlockedTopics.add(id));
}

// 대사 텍스트(HTML 문자열)에서 키워드 하이라이트 처리
function applyIqHighlightStr(text, words) {
  if (!words || words.length === 0) return text;
  words.forEach(word => {
    const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    text = text.replace(new RegExp(escaped, 'g'),
      `<span class="iq-highlight">${word}</span>`);
  });
  return text;

IQ_REPEAT_SCENES.forEach((pattern) => {
  pattern.forEach((sc, idx) => {
    const isLast = idx === pattern.length - 1;
    _iqSceneCache[sc.id] = {
      bg: BG.b2b_bor,
      label: '12시 49분 | 피해자의 집 침실 [신문]',
      chars: sc.chars, speaker: sc.speaker || '', text: sc.text,
      type: isLast ? 'iq_answer_end' : 'iq_answer',
      next: isLast ? 'iq_return' : pattern[idx + 1].id,
      _monologue: sc._monologue || false,
      _keepChars: sc._keepChars || false,
    };
  });
});

// 답변 씬 캐시 빌드
function _buildIqSceneCache() {
  Object.entries(INTERROGATE_SCENES).forEach(([target, topics]) => {
    Object.entries(topics).forEach(([topicId, scenes]) => {
      scenes.forEach((sc, idx) => {
        const isLast = idx === scenes.length - 1;
        const isConflict = topicId === 'conflict';
        _iqSceneCache[sc.id] = {
          ...sc,
          bg: sc.bg || BG.b2b_bor,
          label: sc.label || '12시 49분 | 피해자의 집 침실 [신문]',
          highlight: sc.highlight || [],
          type: isLast && isConflict ? 'iq_conflict_end' : (isLast ? 'iq_answer_end' : 'iq_answer'),
          next: isLast ? (isConflict ? INTERROGATE_CONFLICT_NEXT[target] : 'iq_return') : scenes[idx + 1].id,
          _topicId: topicId,
          _target: target,
        };
      });
    });
  });
}
_buildIqSceneCache();

  s76b: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0, dim:true},{src:SH.anxious, x:55, y:0, scale:1.0, dim:false}], speaker: '', typeSpeed: 60, text: '하늘이의 떨리는 손이 가리킨 곳은 베란다였다.', type: 'next', next: 's76c', bgZoom: true, bgZoomOrigin: '26.4% 63.7%', bgZoomScale: 2.3, onEnter: () => playBGM(CDN_AUDIO + 'BGM/bgm_somber.mp3') },

  s77: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0,dim:true},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '백서현', typeSpeed: 60, text: '"보, 보라야…?"', type: 'next', next: 's78', bgZoom: true, bgZoomOrigin: '26.4% 63.7%', bgZoomScale: 2.8 },
  s78: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0,dim:true},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '', typeSpeed: 60, text: '발가벗겨진 채 굳어 있는 보라의 모습은 마치 내다 버려진 마네킹과 같았다.', type: 'next', next: 's78b' },
  s78b: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0,dim:true},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '', typeSpeed: 60, text: '함몰된 뒤통수에 엉겨 붙은 검붉은 피.', type: 'next', next: 's78c' },
  s78c: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0,dim:true},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '', typeSpeed: 60, text: '솟구치는 구토감을 간신히 삼켰다.', type: 'next', next: 's79' },
  s79: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0,dim:true},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '', typeSpeed: 60, text: '활짝 열린 창문으로 스며드는 바람은 창틀과 베란다를 적시고도 남았지만,', type: 'next', next: 's79b' },
  s79b: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0,dim:true},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '', typeSpeed: 60, text: '속에서부터 차오르는 역겨움을 잠재우기엔 모자랐다.', type: 'next', next: 's80' },
  s80: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0,dim:true},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '백서현', typeSpeed: 28, text: '"하, 하늘아, 우, 우선 신고부터……"', type: 'next', next: 's80b', bgZoomOut: true },
  s80b: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0, dim:false, anim:'shake'},{src:SH.anxious, x:18, y:0, scale:1.0, dim:false}], speaker: '강하늘', text: '"……"', type: 'next', next: 's81' },
  s81: { bg: BG.bed_bor, label: '12시 37분 | 임보라의 집 안방', chars: [{src:HA.casual_panic, x:82, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '', text: '초점을 잃은 눈으로 허공을 더듬는 하늘이 대신, 떨리는 손으로 경찰에 신고했다.', type: 'fade_transition', next: 's81b', fadeTo: BG.fro_bor },
  s81b: { bg: BG.fro_bor, label: '12시 37분 | 임보라의 집 앞', chars: [], speaker: '', text: '하늘이를 부축하고 나온 지 얼마 지나지 않아, 경찰이 들이닥쳤다.', type: 'next', next: 'chapter1_title' },
  chapter1_title: { bg: 'linear-gradient(160deg,#080810,#0c0c16)', label: '', chars: [], speaker: '', text: '', type: 'chapter_title', next: 'chapter1_end', chapterNum: '이상현상 관리본부 제 1장', chapterMain: '명화대 여신 살인사건', chapterSub: '' },
  chapter1_end: { bg: 'linear-gradient(160deg,#080810,#0c0c16)', label: '', chars: [], speaker: '', text: '', type: 'restart' },
  s82: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false}], speaker: '최바름', text: '"안녕하십니까, 수사반장 최바름입니다. 그냥 반장님이라고 불러주세요."', type: 'next', next: 's83', onEnter: () => playBGM(CDN_AUDIO + 'BGM/bgm_main.mp3') },
  s83: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false}], speaker: '', text: '반장은 짧게 악수를 청하고, 잠시 뜸을 들인 후 말을 이었다.', type: 'next', next: 's84' },
  s84: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false}], speaker: '최바름', text: '"시신을 처음 발견하신 분은 백서현 씨의 후배분이신 강하늘 씨. 맞습니까?"', type: 'next', next: 's85' },
  s85: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:HA.casual_uneasy, x:32, y:0, scale:1.0, dim:false},{src:RI.default, x:65, y:0, scale:1.0, dim:false}], speaker: '강하늘', text: '"… 네."', type: 'next', next: 's86' },
  s86: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:SM.default, x:80, y:0, scale:1.0, dim:false}], speaker: '최바름', text: '"성 형사, 피해자의 신원은?"', type: 'next', next: 's87' },
  s87: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:SM.default, x:80, y:0, scale:1.0, dim:false}], speaker: '', text: '반장의 옆에 바싹 붙어 선 남자는 시선을 서류에 박은 채 입을 열었다.', type: 'next', next: 's88' },
  s88: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:SM.default, x:80, y:0, scale:1.0, dim:false}], speaker: '성 형사', text: '"넵, 피해자의 이름은 임보라, 21세. 명화대에 다니는 학생으로 후두부를 각목으로 몇 차례 가격당해 사망한 것으로 추정됩니다."', type: 'next', next: 's89' },
  s89: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:SM.default, x:80, y:0, scale:1.0, dim:false}], speaker: '', text: '그는 준비된 사진 몇 장을 반장에게 건네주었다. 반장이 내게 다시 말했다.', type: 'next', next: 's90' },
  s90: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '최바름', text: '"두 분은 피해자와 어떤 관계이시죠?"', type: 'next', next: 's91' },
  s91: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '백서현', text: '"같은… 동아리 부원이에요."', type: 'next', next: 's92' },
  s92: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '최바름', text: '"동아리요?"', type: 'next', next: 's93' },
  s93: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:HA.casual_uneasy, x:32, y:0, scale:1.0, dim:false}], speaker: '', text: '반장의 되물음에 하늘이가 입을 열었다.', type: 'next', next: 's94' },
  s94: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:HA.casual_uneasy, x:32, y:0, scale:1.0, dim:false}], speaker: '강하늘', text: '"…\'순정네들\'이라고, 순수미술로 작품 만드는… 그런 곳이에요."', type: 'next', next: 's95' },
  s95: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:HA.casual_uneasy, x:32, y:0, scale:1.0, dim:false}], speaker: '최바름', text: '"순수미술요…?"', type: 'next', next: 's96' },
  s96: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:HA.casual_uneasy, x:32, y:0, scale:1.0, dim:false}], speaker: '강하늘', text: '"… 아니, 사실 그렇게 거창한 건 아니고… 회화나 조각상 같은 거 만들면서 넷이 노는 동아리예요."', type: 'next', next: 's97' },
  s97: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.point, x:82, y:0, scale:1.0,dim:false}], speaker: '최바름', text: '"저 나무로 된 삼각대도 그때 쓰는 건가요?"', type: 'next', next: 's98', bgZoom: true, bgZoomOrigin: '62.0% 83.4%', bgZoomScale: 3.2 },
  s98: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.point, x:82, y:0, scale:1.0,dim:false}], speaker: '', text: '반장의 시선은 방 한가운데 덩그러니 쓰러져 있는 이젤에 닿았다.', type: 'next', next: 's99' },
  s99: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '백서현', text: '"네. 이젤이라고… 그림판 올려두는 거치대 같은 거예요."', type: 'next', next: 's100' },
  s100: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:SM.default, x:80, y:0, scale:1.0, dim:false}], speaker: '최바름', text: '"그렇군요. 성 형사, 흉기로 쓰인 각목의 출처가 저 이젤인가?"', type: 'next', next: 's101', bgZoom: true, bgZoomOrigin: '77.8% 82.7%', bgZoomScale: 3.0 },
  s101: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:65, y:0, scale:1.0, dim:false},{src:SM.default, x:80, y:0, scale:1.0, dim:false}], speaker: '성 형사', text: '"넵, 아직 감식 중이지만 그럴 가능성이 크답니다."', type: 'next', next: 's102' },
  s102: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '', text: '다리에 금이 갔으니 새것으로 사주겠다고, 부실에서 보라에게 건넸던 말이 아직도 귓가에 쟁쟁하다.', type: 'next', next: 's103' },
  s103: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '', text: '그때까지만 해도. 보라의 이젤이 그녀의 생을 마감하는 흉기가 될 줄은 누구도 상상하지 못했다.', type: 'next', next: 's104' },
  s104: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '최바름', text: '"두 분이 여기 오신 경위는 어떻게 되죠?"', type: 'next', next: 's105', bgZoomOut: true },
  s105: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '백서현', text: '"보라가 이사를 마쳤다고 저한테 연락이 왔었어요. 그래서 몰래 와서 놀라게 해주려고 했는데…"', type: 'next', next: 's106' },
  s106: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '최바름', text: '"통화를 하신 건가요?"', type: 'next', next: 's107' },
  s107: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '백서현', text: '"으음… 잠시만요, 문자로 해서 기록이 남아있을 거예요."', type: 'next', next: 's108' },
  s108: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [{src:RI.default, x:78, y:0, scale:1.0,dim:false},{src:SH.anxious, x:18, y:0, scale:1.0,dim:false}], speaker: '', text: '나는 더듬거리는 손으로 핸드폰을 찾아, 보라와 주고받은 메시지를 펼쳐 보였다.', type: 'next', next: 's108_img' },
  s108_img: { bg: BG.bed_bor, label: '12시 44분 | 임보라의 집 안방', chars: [], speaker: '', text: '', type: 'show_image', next: 's109', imgSrc: `${CDN_CH1}evidence_ch1/ev_boramsg.jpg` },

// ─── 패널 리사이즈 ───
(function() {
  const MIN_W = 220, MAX_W_VW = 0.72;
  let _dragging = null, _startX = 0, _startW = 0;

  function onDown(e) {
    const handle = e.currentTarget;
    const panelId = handle.dataset.panel;
    const panel = document.getElementById(panelId);
    if (!panel) return;
    _dragging = panel;
    _startX = e.touches ? e.touches[0].clientX : e.clientX;
    _startW = panel.offsetWidth;
    handle.classList.add('dragging');
    e.preventDefault();
  }

  function onMove(e) {
    if (!_dragging) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const dx = cx - _startX;
    const maxW = Math.floor(window.innerWidth * MAX_W_VW);
    const newW = Math.min(maxW, Math.max(MIN_W, _startW + dx));
    _dragging.style.width = newW + 'px';
    _dragging.style.maxWidth = 'none';
  }

  function onUp() {
    if (!_dragging) return;
    document.querySelectorAll('.panel-resize-handle').forEach(h => h.classList.remove('dragging'));
    _dragging = null;
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);

  document.querySelectorAll('.panel-resize-handle').forEach(h => {
    h.addEventListener('mousedown', onDown);
    h.addEventListener('touchstart', onDown, { passive: false });
  });
})();

function spawnUnlockConfetti(cx, cy) {
  const screen = document.getElementById('vn-root');
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:20;';
  canvas.width  = screen.offsetWidth;
  canvas.height = screen.offsetHeight;
  screen.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#86efac','#a7f3d0','#6ee7b7','#ffffff','#c4b8f0'];
  const pts = [];
  for (let i = 0; i < 10; i++) {
    const angle = (i/10)*Math.PI*2 + (Math.random()-0.5)*0.5;
    const spd   = 24 + Math.random()*28;
    pts.push({ x:cx, y:cy, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
      w:1+Math.random(), h:6+Math.random()*7,
      rot:angle+Math.PI/2, rotSpd:(Math.random()-0.5)*5,
      color:colors[i%colors.length] });
  }
  const start = performance.now(), dur = 580;
  function draw(now) {
    const t = Math.min((now-start)/dur,1), e = 1-Math.pow(1-t,2);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p => {
      ctx.save(); ctx.globalAlpha = Math.max(0,1-t*1.3); ctx.fillStyle = p.color;
      ctx.translate(p.x+p.vx*e, p.y+p.vy*e); ctx.rotate(p.rot+p.rotSpd*e);
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    });
    if (t<1) requestAnimationFrame(draw); else canvas.remove();
  }
  requestAnimationFrame(draw);
}

  // 흔들림: 좌우로 짧게 진동 후 제자리 유지
  function shakeEase(t){
    if(t>1)return 0;
    return Math.sin(t*Math.PI*3.5)*Math.pow(1-t,1.8);
  }

  const DUR_IN = 700;     // 등장 구간
  const HOLD   = 400;     // 잠긴 채 홀드
  const DUR_OUT= 600;     // 페이드아웃 구간
  const TOTAL  = DUR_IN + HOLD + DUR_OUT;
  let phase = 'in'; // in → hold → out
  let phaseT0 = null;
  let shookFired = false;

  requestAnimationFrame(() => {
    badge.style.transition = 'opacity 0.45s ease, transform 0.55s cubic-bezier(0.22,1,0.36,1)';
    badge.style.opacity = '1';

      const elapsed = now - t0;

      if (elapsed < DUR_IN) {

        const t = elapsed / DUR_IN;

        lock.style.opacity = '1';
        lock.style.filter = 'none';
      } else if (elapsed < DUR_IN + HOLD) {
        // 홀드: 자물쇠 흔들림 (열리지 않음)
        const t = (elapsed - DUR_IN) / HOLD;
        if (!shookFired) { shookFired = true; }
        const shake = shakeEase(t) * 14; // 좌우 deg
        lock.style.transform = `rotateY(-8deg) rotateZ(${-5 + shake}deg) translateY(0px) rotateX(-8deg)`;
        // 붉은 발광 펄스
        const pulse = Math.sin(t * Math.PI * 2) * 0.5 + 0.5;
        lock.style.filter = `drop-shadow(0 0 ${(pulse * 8).toFixed(1)}px rgba(248,113,113,0.7))`;

        const t = (elapsed - DUR_IN - HOLD) / DUR_OUT;
        const ft = Math.min(t, 1);
        lock.style.opacity = String(1 - ft);
        lock.style.transform = `rotateY(-8deg) rotateZ(-5deg) translateY(${ft * 10}px) rotateX(-8deg)`;
        lock.style.filter = `drop-shadow(0 0 ${((1 - ft) * 4).toFixed(1)}px rgba(248,113,113,0.4))`;
      }

      if (elapsed < TOTAL) {
        requestAnimationFrame(anim);
      } else {
        lock.style.opacity = '0';
        lock.style.filter = 'none';
      }
    }
    requestAnimationFrame(anim);
  });

  // 뱃지 fade out
  setTimeout(() => {
    const t0 = performance.now(), BFUR = 700;
    function badgeFade(now) {
      const ft = Math.min((now - t0) / BFUR, 1);

    }
    requestAnimationFrame(badgeFade);
  }, TOTAL + 300);
}

      lock.style.transform=`rotateY(${140+(-8-140)*sp}deg) rotateZ(${35+(-5-35)*p}deg) translateY(${20-20*p}px) rotateX(${-8*p}deg)`;

      if(t>=FADE_START_T){
        if(!fadeStarted){fadeStarted=true;fadeT0=now;}
        const ft=Math.min((now-fadeT0)/FADE_DUR,1);
        lock.style.opacity=String(1-ft);
        lock.style.filter=`drop-shadow(0 0 ${(Math.sin(ft*Math.PI)*6).toFixed(1)}px rgba(134,239,172,0.6))`;
        if(!shFired&&ft>=SH_T){
          shFired=true;
          shG.style.transition='transform 0.38s cubic-bezier(0.22,1,0.36,1)';
          shG.style.transformOrigin='43px 34px';
          shG.style.transform='translateY(-14px) rotate(-22deg)';
        }
      }
      if(t<1){requestAnimationFrame(anim);}
      else{
        lock.style.opacity='0';lock.style.filter='none';
        shWrap.style.transition='opacity 0.28s ease';
        shWrap.style.opacity='0';
      }
    }
    requestAnimationFrame(anim);
  });

  // 뱃지 발광하며 사라짐
  setTimeout(()=>{
    const t0=performance.now(),BFUR=700;
    function badgeFade(now){
      const ft=Math.min((now-t0)/BFUR,1);
      badge.style.opacity=String(1-ft);
      const g=(Math.sin(ft*Math.PI)*5).toFixed(1);
      badge.style.boxShadow=`0 0 ${g}px rgba(134,239,172,0.55),inset 0 0 ${g}px rgba(134,239,172,0.15)`;
      if(ft<1)requestAnimationFrame(badgeFade);
      else{
        widget.remove();
        _activeWidgetSlots.delete(slot);
      }
    }
    requestAnimationFrame(badgeFade);
  }, DUR+700);
}

function pressFloatBtn() {
  const floatBtn = document.getElementById('continue-btn-float');
  if (!floatBtn || floatBtn.classList.contains('hidden') || !floatBtn._cb) return;
  if (floatBtn.classList.contains('pressing')) return;
  floatBtn.blur();
  floatBtn.classList.add('pressing');
  const cb = floatBtn._cb;
  floatBtn._cb = null;
  setTimeout(() => {
    floatBtn.classList.remove('pressing');
    cb();
  }, 160);
}

// floatBtn 마우스 클릭도 pressFloatBtn으로 처리
document.addEventListener('DOMContentLoaded', () => {
  // 타이틀 첫 버튼 포커스
  const _tBtn = document.querySelector('.title-menu-btn');
  if (_tBtn) _tBtn.classList.add('focused');
  const floatBtn = document.getElementById('continue-btn-float');
  if (floatBtn) floatBtn.addEventListener('click', pressFloatBtn);
});


// ── 키보드 조작 ──
let _choiceIdx = -1;
let _uiClosedAt = 0; // 패널/라이트박스 닫힌 시각 (쿨다운용) // 현재 선택지 포커스 인덱스

function getChoiceBtns() {
  const iqBtns = [...document.querySelectorAll('#interrogate-topic-list .iq-topic-btn:not(.done)')];
  if (iqBtns.length > 0) return iqBtns;
  // 조사 토픽 + 구경 계속 버튼 함께 탐색
  const investWrap = document.getElementById('invest-wrap');
  if (investWrap && investWrap.style.display !== 'none') {
    const investBtns = [...document.querySelectorAll('#invest-topic-list .invest-topic-btn:not(.done)')];
    const contBtn = document.getElementById('continue-after-invest');
    const contVisible = contBtn && contBtn.style.display !== 'none' && contBtn.style.display !== '';
    const contBtnEl = contVisible ? contBtn.querySelector('.invest-cont-btn') : null;
    const all = contBtnEl ? [...investBtns, contBtnEl] : investBtns;
    if (all.length > 0) return all;
  }
  return [...document.querySelectorAll('#choices .choice-btn')];
}

function focusChoice(idx) {
  const btns = getChoiceBtns();
  if (btns.length === 0) return;
  _choiceIdx = Math.max(0, Math.min(idx, btns.length - 1));
  btns.forEach((b, i) => {
    b.classList.toggle('kb-focus', i === _choiceIdx);
  });
}

document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;

  // ── 타이틀 화면 키 연동 ──
  const titleScreen = document.getElementById('title-screen');
  if (titleScreen && !titleScreen.classList.contains('fade-out') && !titleScreen.classList.contains('hidden')) {
    const tBtns = [...document.querySelectorAll('.title-menu-btn')].filter(b => b.offsetParent !== null);
    let tFocused = tBtns.findIndex(b => b.classList.contains('focused'));
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      e.preventDefault();
      if (tFocused >= 0) tBtns[tFocused].classList.remove('focused');
      tFocused = Math.min(tFocused + 1, tBtns.length - 1);
      if (tBtns[tFocused]) tBtns[tFocused].classList.add('focused');
      return;
    }
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      if (tFocused >= 0) tBtns[tFocused].classList.remove('focused');
      tFocused = Math.max(tFocused - 1, 0);
      if (tBtns[tFocused]) tBtns[tFocused].classList.add('focused');
      return;
    }
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      const target = tFocused >= 0 ? tBtns[tFocused] : tBtns[0];
      if (target) target.click();
      return;
    }
  }

  // ── 저장 팝업 키 연동 ──
  const saveModal = document.getElementById('restart-modal');
  const savePrompt = document.getElementById('save-prompt');
  if (saveModal && saveModal.classList.contains('open') && savePrompt && savePrompt.style.display !== 'none') {
    const sBtns = [...document.querySelectorAll('.save-choice-btn')];
    let sFocused = sBtns.findIndex(b => b.classList.contains('focused'));
    if (e.code === 'ArrowLeft' || e.code === 'KeyA' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      sBtns.forEach(b => b.classList.remove('focused'));
      sFocused = Math.max(sFocused - 1, 0);
      if (sBtns[sFocused]) sBtns[sFocused].classList.add('focused');
      return;
    }
    if (e.code === 'ArrowRight' || e.code === 'KeyD' || e.code === 'ArrowDown' || e.code === 'KeyS') {
      e.preventDefault();
      sBtns.forEach(b => b.classList.remove('focused'));
      sFocused = Math.min(sFocused + 1, sBtns.length - 1);
      if (sBtns[sFocused]) sBtns[sFocused].classList.add('focused');
      return;
    }
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      const target = sFocused >= 0 ? sBtns[sFocused] : sBtns[0];
      if (target) target.click();
      return;
    }
  }

  const btns = getChoiceBtns();

  // 선택지 탐색
  if (btns.length > 0) {
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      e.preventDefault();
      focusChoice(_choiceIdx < 0 ? 0 : _choiceIdx + 1);
      return;
    }
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      focusChoice(_choiceIdx < 0 ? 0 : _choiceIdx - 1);
      return;
    }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      e.preventDefault();
      focusChoice(_choiceIdx < 0 ? 0 : _choiceIdx + 1);
      return;
    }
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      e.preventDefault();
      focusChoice(_choiceIdx < 0 ? 0 : _choiceIdx - 1);
      return;
    }
    if ((e.code === 'Space' || e.code === 'Enter') && _choiceIdx >= 0) {
      e.preventDefault();
      const target = btns[_choiceIdx];
      if (target) { _choiceIdx = -1; btns.forEach(b => b.classList.remove('kb-focus')); target.click(); }
      return;
    }
  }

  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    pressFloatBtn();
  }
  // Escape — 열린 패널/라이트박스 닫기
  if (e.code === 'Escape') {
    const lb = document.getElementById('img-lightbox');
    if (lb && lb.classList.contains('open')) { e.preventDefault(); closeLightbox(); return; }
    const panels = [
      { id: 'casefile-panel', fn: toggleCasefile },
      { id: 'evidence-panel', fn: toggleEvidence },
      { id: 'log-panel',      fn: toggleLog },
    ];
    for (const { id, fn } of panels) {
      const p = document.getElementById(id);
      if (p && p.classList.contains('open')) { e.preventDefault(); fn(); return; }
    }
  }
});

// 모든 버튼 클릭 후 포커스 해제 + 100ms 디바운스 (로지텍 더블클릭 버그 대응)
let _lastClickTime = 0;
document.addEventListener('click', e => {
  if (e.target.tagName === 'BUTTON') {
    e.target.blur();
    const now = Date.now();
    if (now - _lastClickTime < 100) {
      e.stopImmediatePropagation();
      e.preventDefault();
      return;
    }
    _lastClickTime = now;
  }
}, true);


function startGame(resumeSceneId) {
  const title = document.getElementById('title-screen');
  const overlay = document.getElementById('fade-overlay');
  const bgLayer = document.getElementById('bg-layer');
  const textbox = document.getElementById('textbox');

  document.getElementById('restart-modal').classList.remove('open');
  document.getElementById('save-prompt').style.display = 'block';
  document.getElementById('wip-prompt').style.display = 'none';
  { const _sf = document.querySelector('.save-choice-btn'); if (_sf) { document.querySelectorAll('.save-choice-btn').forEach(b=>b.classList.remove('focused')); _sf.classList.add('focused'); } }
  isTransitioning = true;
  textbox.style.visibility = 'hidden';

  // 1. 타이틀 페이드 아웃
  title.classList.add('fade-out');

  setTimeout(() => {
    // 2. 검은 화면
    title.classList.add('hidden');
    overlay.classList.add('black');

    // 3. transition 끄고 배경 세팅
    getAudioCtx();
    // 증거 효과음 미리 로드
    fetch(`${CDN_AUDIO}sfx/sfx_evid.mp3`)
      .then(r => r.arrayBuffer())
      .then(ab => getAudioCtx().decodeAudioData(ab))
      .then(buf => { evidenceAudioBuffer = buf; })
      .catch(() => {});
    bgLayer.style.cssText = `position:fixed;inset:0;background:${S[resumeSceneId || 'prologue'].bg};background-size:cover;background-position:center center;background-repeat:no-repeat;transform:translate(0px,0px) scale(1);transform-origin:0 0;transition:none;`;
    currentBg = S[resumeSceneId || 'prologue'].bg;

    setTimeout(() => {
      // 4. 페이드 인 — fading 클래스로 transition 활성화 후 black 제거
      overlay.classList.add('fading');
      void overlay.offsetWidth; // reflow 강제
      overlay.classList.remove('black');

      setTimeout(() => {
        // 5. 페이드 완료 후 콘텐츠 등장
        overlay.classList.remove('fading');
        bgLayer.style.transition = 'background 0.6s ease, transform 1.6s cubic-bezier(0.37, 0, 0.63, 1)';
        textbox.style.visibility = '';
        document.getElementById('top-right').style.visibility = '';
        // 슬라이더 패널 모두 닫기
        ['casefile-panel','evidence-panel','log-panel'].forEach(id => {
          document.getElementById(id).classList.remove('open');
        });
        isTransitioning = false;
        if (!resumeSceneId) startBGM();
        renderScene(resumeSceneId || 'prologue');
      }, 2600);

    }, 200);

  }, 1200);
}
