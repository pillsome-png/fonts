<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>이상현상 관리본부</title></head>
<body>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow: hidden; height: 100%; }

#vn-root { font-family: var(--font-sans); width: 100%; height: 100dvh; position: relative; overflow: hidden; background: #0e0e18; }

#bg-layer { position: fixed; inset: 0; background-size: cover; background-position: center center; background-repeat: no-repeat; z-index: 0; transition: background 0.6s ease, transform 1.6s cubic-bezier(0.37, 0, 0.63, 1); transform-origin: 0 0; }
#bg-overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 55%, rgba(0,0,0,0.75) 100%), radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%); z-index: 1; }

#top-right { position: absolute; top: 14px; right: 16px; display: flex; gap: 11px; z-index: 10; }
.top-btn { background: rgba(0,0,0,0.5); border: 0.5px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.8); border-radius: 24px; padding: 9px 16px; font-size: 18px; cursor: pointer; backdrop-filter: blur(6px); user-select: none; }
.top-btn:hover { background: rgba(0,0,0,0.7); }
.top-btn:disabled { opacity: 0.3; cursor: default; }
#ev-count { display: inline-block; background: #a89ccc; color: #1a1030; border-radius: 11px; font-size: 15px; padding: 1px 7px; margin-left: 4px; font-weight: 500; }

#scene-label { position: absolute; top: 16px; left: 16px; z-index: 10; background: rgba(0,0,0,0.55); border: 0.5px solid rgba(255,255,255,0.18); backdrop-filter: blur(8px); border-radius: 24px; padding: 8px 16px; font-size: 16px; color: rgba(255,255,255,0.9); letter-spacing: 0.06em; }

/* 캐릭터 — 자유 포지셔닝 */
#char-layer { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3; pointer-events: none; height: 100dvh; }
.char-sprite {
  position: absolute; bottom: 0;
  display: flex; align-items: flex-end;
  transform-origin: bottom center;
  transition: opacity 0.35s, filter 0.35s;
}
.char-sprite img { height: 125vh; max-width: 820px; object-fit: contain; object-position: bottom; display: block; }
.char-sprite.dim { opacity: 0.35; filter: brightness(0.5) grayscale(0.3); }
.char-sprite.silhouette img { filter: brightness(0) !important; }
.char-sprite.active { filter: brightness(1.05); }

/* ── 캐릭터 애니메이션 — margin 기반으로 wrap transform과 분리 ── */
@keyframes charShake {
  0%,100% { margin-left: 0; }
  15% { margin-left: -10px; } 30% { margin-left: 10px; }
  45% { margin-left: -7px;  } 60% { margin-left: 7px; }
  75% { margin-left: -4px;  } 90% { margin-left: 4px; }
}
@keyframes charLungeLeft {
  0%   { margin-left: 0;     transform: rotate(0deg); }
  30%  { margin-left: -32px; transform: rotate(-4deg); }
  55%  { margin-left: -20px; transform: rotate(-2deg); }
  100% { margin-left: -14px; transform: rotate(-1deg); }
}
@keyframes charStumble {
  0%   { margin-left: 0;     transform: rotate(0deg); }
  20%  { margin-left: -16px; transform: rotate(-3deg); }
  40%  { margin-left: 12px;  transform: rotate(2deg); }
  60%  { margin-left: -7px;  transform: rotate(-1deg); }
  80%  { margin-left: 4px;   transform: rotate(0.5deg); }
  100% { margin-left: 0;     transform: rotate(0deg); }
}
@keyframes charSlideInLeft  { from { margin-left: -140px; opacity: 0; } to { margin-left: 0; opacity: 1; } }
@keyframes charSlideInRight { from { margin-left:  140px; opacity: 0; } to { margin-left: 0; opacity: 1; } }
@keyframes charBounce  { 0%,100% { margin-top: 0; } 40% { margin-top: -12px; } 70% { margin-top: -5px; } }
@keyframes charFadeIn  { from { opacity: 0; } to { opacity: 1; } }

@keyframes enterFromLeft  { from { transform: translateX(-160px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes enterFromRight { from { transform: translateX( 160px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.char-entering-left  { animation: enterFromLeft  0.5s cubic-bezier(0.22,1,0.36,1) both; }
.char-entering-right { animation: enterFromRight 0.5s cubic-bezier(0.22,1,0.36,1) both; }

.anim-shake          { animation: charShake        0.7s ease-in-out; }
.anim-lunge_left     { animation: charLungeLeft    0.55s cubic-bezier(0.22,1,0.36,1) both; }
.anim-stumble        { animation: charStumble      0.7s ease-in-out; }
.anim-slide_in_left  { animation: charSlideInLeft  0.5s cubic-bezier(0.22,1,0.36,1) both; }
.anim-slide_in_right { animation: charSlideInRight 0.5s cubic-bezier(0.22,1,0.36,1) both; }
.anim-bounce         { animation: charBounce       0.5s ease-out; }
.anim-fade_in        { animation: charFadeIn       0.6s ease both; }

/* 대화창 + 뱃지 공통 슬라이드업 */
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* 대화창 */
#textbox { position: absolute; bottom: 0; left: 0; right: 0; z-index: 5; background: rgba(6,6,14,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 0.5px solid rgba(255,255,255,0.08); padding: 18px 36px 36px; display: flex; flex-direction: column; gap: 0; height: 185px; overflow: visible; }
#textbox.slide-in { animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
#speaker-name { display: none; }

/* 화자 뱃지 — textbox 안에 있고 위로 튀어나옴 */
#speaker-badge { position: absolute; top: -33px; left: 20px; display: none; }
#speaker-badge.visible { display: block; }
#speaker-badge-inner { display: inline-flex; align-items: center; padding: 8px 22px 8px 18px; transform: skewX(16deg); background: rgb(6,6,14); border-top: 0.5px solid rgba(255,255,255,0.08); border-left: 0.5px solid rgba(255,255,255,0.08); border-bottom: none; }
#speaker-badge-text { display: inline-block; transform: skewX(-16deg); font-size: 26px; font-weight: 600; white-space: nowrap; line-height: 1; }
#dialogue-text { font-size: 26px; line-height: 1.75; color: rgba(255,255,255,0.88); height: calc(26px * 1.75 * 3); overflow: hidden; margin-top: 4px; }
.kw { font-weight: 500; }
#choices { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.choice-btn { background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.85); border-radius: 14px; padding: 12px 20px; font-size: 24px; cursor: pointer; text-align: left; transition: background 0.15s; user-select: none; outline: none; }
.choice-btn:hover { background: rgba(168,156,204,0.15); border-color: rgba(168,156,204,0.4); }
.choice-btn:focus { background: rgba(168,156,204,0.2); border-color: rgba(168,156,204,0.7); box-shadow: 0 0 0 2px rgba(168,156,204,0.35); }

/* 계속 버튼 — 오른쪽 하단 플로팅 */
@keyframes btnPress {
  0%   { transform: scale(1); }
  40%  { transform: scale(0.91); }
  70%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
#continue-btn-float { position: absolute; bottom: 20px; right: 30px; z-index: 6; background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); border-radius: 24px; padding: 8px 18px; font-size: 18px; cursor: pointer; transition: background 0.15s; user-select: none; }
#continue-btn-float:hover { background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.9); }
#continue-btn-float.hidden { display: none; }
#continue-btn-float.pressing { animation: btnPress 0.18s cubic-bezier(0.22,1,0.36,1) forwards; }

/* 조사 입력 — 화면 중앙 오른쪽 플로팅 */
#invest-wrap { display: none; position: absolute; top: 50%; left: 62%; transform: translate(-50%, -50%); z-index: 8; width: min(560px, 65vw); flex-direction: column; gap: 11px; background: rgba(6,6,14,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 21px; padding: 23px 24px; overflow: visible; align-items: center; }
#invest-label { font-size: 16px; color: rgba(255,255,255,0.38); letter-spacing: 0.08em; text-align: center; width: 100%; margin-bottom: 4px; user-select: none; }
#invest-topic-list { display: flex; flex-direction: column; gap: 9px; width: 100%; }
.invest-topic-btn { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.13); color: rgba(255,255,255,0.82); border-radius: 14px; padding: 14px 18px; font-size: 21px; font-family: var(--font-sans); cursor: pointer; text-align: left; transition: background 0.15s, border-color 0.15s; user-select: none; width: 100%; }
.invest-topic-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.25); }
.invest-topic-btn.done { opacity: 0.35; cursor: default; pointer-events: none; }
.ev-flash { display: inline-block; margin-top: 6px; background: rgba(168,156,204,0.15); color: #a89ccc; border-radius: 3px; padding: 2px 10px; font-size: 15px; }
#continue-after-invest { display: none; position: absolute; right: 32px; top: 50%; transform: translateY(-50%); z-index: 9; width: 190px; background: rgba(6,6,14,0.68); border: 0.5px solid rgba(168,156,204,0.25); border-radius: 21px; padding: 16px 16px; }
#continue-after-invest .invest-cont-label { font-size: 16px; color: rgba(255,255,255,0.55); margin-bottom: 8px; text-align: center; display: block; }
#continue-after-invest .invest-cont-btn { display: block; width: 100%; background: rgba(168,156,204,0.2); border: 0.5px solid rgba(168,156,204,0.5); color: #c4b8f0; border-radius: 14px; padding: 12px 0; font-size: 18px; cursor: pointer; text-align: center; transition: background 0.15s; user-select: none; }
#continue-after-invest .invest-cont-btn:hover { background: rgba(168,156,204,0.35); }

/* 신문 토픽 버튼 UI */
#interrogate-label { font-size: 16px; color: rgba(255,255,255,0.38); letter-spacing: 0.08em; text-align: center; width: 100%; margin-bottom: 4px; user-select: none; }
#interrogate-topic-list { display: flex; flex-direction: column; gap: 11px; width: 100%; }
.iq-topic-btn {
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(255,255,255,0.13);
  color: rgba(255,255,255,0.82);
  border-radius: 14px;
  padding: 15px 18px;
  font-size: 21px;
  font-family: var(--font-sans);
  cursor: pointer;
  text-align: left;
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
  width: 100%;
}
.iq-topic-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.25); }
.iq-topic-btn.done {
  opacity: 0.35;
  cursor: default;
  pointer-events: none;
}
.iq-topic-btn.locked {
  opacity: 0.45;
  cursor: default;
  pointer-events: all;
  position: relative;
}
.iq-topic-btn.locked .locked-hint {
  display: none;
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: rgba(255,255,255,0.38);
  pointer-events: none;
  white-space: nowrap;
}
.iq-topic-btn.locked:hover {
  background: rgba(255,255,255,0.03);
  cursor: default;
}
.iq-topic-btn.locked:hover .locked-hint {
  display: inline;
}
@keyframes iqBtnSlideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
.iq-topic-btn.sliding-in { animation: iqBtnSlideUp 0.38s cubic-bezier(0.22,1,0.36,1) both; }
.iq-label-kw { color: #86efac; }
.iq-topic-btn.kb-focus, .invest-topic-btn.kb-focus, .invest-cont-btn.kb-focus { background: rgba(168,156,204,0.3); border-color: rgba(168,156,204,0.7); box-shadow: 0 0 0 2px rgba(168,156,204,0.35); }
.iq-highlight { color: #86efac; }


@keyframes interrogateWrapIn  { from { opacity: 0; transform: translate(-50%, -44%); } to { opacity: 1; transform: translate(-50%, -50%); } }
@keyframes interrogateWrapOut { from { opacity: 1; transform: translate(-50%, -50%); } to { opacity: 0; transform: translate(-50%, -62%); } }
#interrogate-wrap { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 8; width: min(560px, 65vw); flex-direction: column; gap: 11px; background: rgba(6,6,14,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 21px; padding: 23px 24px; overflow: visible; align-items: center; }

#interrogate-topics { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 4px; }

#continue-after-interrogate { display: none; position: absolute; right: -210px; top: 50%; transform: translateY(-50%); width: 190px; background: rgba(6,6,14,0.68); border: 0.5px solid rgba(168,156,204,0.25); border-radius: 21px; padding: 16px 16px; }
#continue-after-interrogate .cont-label { font-size: 16px; color: rgba(255,255,255,0.55); margin-bottom: 8px; text-align: center; display: block; }
#continue-after-interrogate .cont-btn { display: block; width: 100%; background: rgba(168,156,204,0.2); border: 0.5px solid rgba(168,156,204,0.5); color: #c4b8f0; border-radius: 14px; padding: 12px 0; font-size: 18px; cursor: pointer; text-align: center; transition: background 0.15s; user-select: none; }
#continue-after-interrogate .cont-btn:hover { background: rgba(168,156,204,0.35); }

/* 신문 시작 구분선 연출 */
/* 신문 시작 구분선 */
#interrogate-divider { display: none; position: absolute; top: 0; left: 50%; z-index: 2; pointer-events: none; width: 40px; overflow: visible; }
#interrogate-divider.active { display: block; }
@keyframes dividerDrop {
  from { stroke-dashoffset: 2000; opacity: 0; }
  to   { stroke-dashoffset: 0;    opacity: 1; }
}
@keyframes dividerRise {
  from { stroke-dashoffset: 0;    opacity: 1; }
  to   { stroke-dashoffset: -2000; opacity: 0; }
}
#interrogate-divider svg { display: block; }
/* 신문 시작 텍스트 오버레이 */
#interrogate-start-text { display: none; position: absolute; inset: 0; z-index: 7; align-items: center; justify-content: center; pointer-events: none; }
#interrogate-start-text.active { display: flex; }
@keyframes interrogateTextIn  { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
@keyframes interrogateTextOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(1.08); } }
#interrogate-start-text span { font-size: 41px; font-weight: 600; letter-spacing: 0.12em; color: rgba(255,255,255,0.9); user-select: none; }

/* 시작 화면 */
#title-screen { position: absolute; inset: 0; z-index: 30; background: #06060e; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; transition: opacity 1.2s ease; }
#title-screen.fade-out { opacity: 0; pointer-events: none; }
#title-screen.hidden { display: none; }
#title-bg { position: absolute; inset: 0; background: linear-gradient(160deg, #0a0818, #0e0c20); }
#title-particles { position: absolute; inset: 0; opacity: 0.15; background-image: radial-gradient(circle, rgba(168,156,204,0.4) 1px, transparent 1px); background-size: 40px 40px; }
#title-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 39px; }
#title-label { font-size: 16px; letter-spacing: 0.3em; color: rgba(168,156,204,0.5); text-transform: uppercase; }
#title-name { font-size: 54px; font-weight: 600; color: rgba(255,255,255,0.92); letter-spacing: 0.05em; text-align: center; line-height: 1.3; }
#title-sub { font-size: 18px; color: rgba(255,255,255,0.25); letter-spacing: 0.15em; margin-top: -16px; }
#title-start { margin-top: 16px; background: rgba(168,156,204,0.12); border: 0.5px solid rgba(168,156,204,0.4); color: #c4b8f0; border-radius: 49px; padding: 16px 48px; font-size: 23px; cursor: pointer; letter-spacing: 0.08em; transition: background 0.2s, transform 0.2s; user-select: none; }
#title-start:hover { background: rgba(168,156,204,0.25); transform: scale(1.03); }
.save-choice-btn.focused { outline: 1.5px solid rgba(196,184,240,0.8); background: rgba(168,156,204,0.2); }
.title-menu-btn.focused { outline: 1.5px solid rgba(196,184,240,0.8); background: rgba(168,156,204,0.25); }

/* 페이드 오버레이 */
#fade-overlay { position: absolute; inset: 0; background: #000; opacity: 0; pointer-events: none; z-index: 40; }
#fade-overlay.black { opacity: 1; pointer-events: all; }
#fade-overlay.fading { transition: opacity 2.5s ease; }
#restart-modal { display: none; position: absolute; inset: 0; z-index: 35; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); }
#restart-modal.open { display: flex; }
#restart-box { background: rgba(6,6,14,0.95); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 46px 40px; display: flex; flex-direction: column; align-items: center; gap: 21px; min-width: 280px; user-select: none; }
#restart-box p { font-size: 23px; color: rgba(255,255,255,0.6); text-align: center; line-height: 1.7; user-select: none; }
#restart-box button { background: rgba(168,156,204,0.15); border: 0.5px solid rgba(168,156,204,0.4); color: #c4b8f0; border-radius: 14px; padding: 14px 32px; font-size: 23px; cursor: pointer; transition: background 0.15s; }
#restart-box button:hover { background: rgba(168,156,204,0.3); }

#evidence-panel { display: flex; flex-direction: column; position: absolute; top: 0; left: 0; bottom: 0; width: 588px; max-width: 45vw; background: rgba(6,6,14,0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-right: 0.5px solid rgba(255,255,255,0.08); padding: 0; gap: 0; z-index: 50; overflow: hidden; transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1); pointer-events: none; }
#evidence-panel.open { transform: translateX(0); pointer-events: all; }
#ep-header { display: flex; justify-content: space-between; align-items: center; padding: 21px 18px 12px; flex-shrink: 0; border-bottom: 0.5px solid rgba(255,255,255,0.07); }
#ep-title { font-size: 18px; font-weight: 500; color: #a89ccc; }
#ep-close { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 25px; cursor: pointer; user-select: none; }
#evidence-list { flex: 1; overflow-y: auto; padding: 14px 18px 20px; scrollbar-width: thin; scrollbar-color: rgba(168,156,204,0.4) rgba(255,255,255,0.05); }
#evidence-list::-webkit-scrollbar { width: 4px; }
#evidence-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 2px; }
#evidence-list::-webkit-scrollbar-thumb { background: rgba(168,156,204,0.4); border-radius: 2px; }
#evidence-list::-webkit-scrollbar-thumb:hover { background: rgba(168,156,204,0.65); }

/* 채팅 로그 패널 — 왼쪽 슬라이드 */
#log-panel { display: flex; flex-direction: column; position: absolute; top: 0; left: 0; bottom: 0; width: 672px; max-width: 50vw; background: rgba(6,6,14,0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-right: 0.5px solid rgba(255,255,255,0.08); padding: 0; gap: 0; z-index: 50; overflow: hidden; transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1); pointer-events: none; }
#log-panel.open { transform: translateX(0); pointer-events: all; }
#log-header { display: flex; justify-content: space-between; align-items: center; padding: 21px 18px 12px; flex-shrink: 0; border-bottom: 0.5px solid rgba(255,255,255,0.07); }
#log-title { font-size: 18px; font-weight: 500; color: #a89ccc; }
#log-close { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 25px; cursor: pointer; }
#log-list { flex: 1; overflow-y: auto; padding: 14px 18px 20px; display: flex; flex-direction: column; gap: 0; scrollbar-width: thin; scrollbar-color: rgba(168,156,204,0.4) rgba(255,255,255,0.05); }
#log-list::-webkit-scrollbar { width: 4px; }
#log-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 2px; }
#log-list::-webkit-scrollbar-thumb { background: rgba(168,156,204,0.4); border-radius: 2px; }
#log-list::-webkit-scrollbar-thumb:hover { background: rgba(168,156,204,0.65); }
.log-entry { padding: 12px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
.log-entry:last-child { border-bottom: none; }
.log-speaker { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
.log-speaker.narration { color: rgba(255,255,255,0.3); font-weight: 400; font-style: italic; }
.log-text { font-size: 18px; line-height: 1.7; color: rgba(255,255,255,0.8); }
#ep-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
#ep-title { font-size: 18px; font-weight: 500; color: #a89ccc; }
#ep-close { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 25px; cursor: pointer; }
.ev-item { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; cursor: grab; transition: opacity 0.15s, transform 0.2s cubic-bezier(0.22,1,0.36,1); }
.ev-item:active { cursor: grabbing; }
.ev-item.drag-ghost { opacity: 0.35; }
.ev-item-name { font-size: 18px; font-weight: 500; color: rgba(255,255,255,0.87); margin-bottom: 3px; }

const HIGHLIGHT_RULES = [];

function highlightText(text) {
  let result = '';
  text.split('\n').forEach((line, i) => {
    if (i > 0) result += '<br>';
    let esc = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const sorted = [];
    HIGHLIGHT_RULES.forEach(r => r.words.forEach(w => sorted.push({w, color: r.color})));
    sorted.sort((a,b) => b.w.length - a.w.length);
    sorted.forEach(({w, color}) => {
      esc = esc.replace(new RegExp(w,'g'), `<span class="kw" style="color:${color};font-weight:500">${w}</span>`);
    });
    result += esc;
  });
  return result;
}

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // 무음 버퍼로 워밍업 — 첫 소리 튐 방지
    const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
  }
  return audioCtx;
}

function playTypingSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.04, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.05);
  } catch(e) {}
}

function playPhoneVibration() {
  try {
    const ctx = getAudioCtx();
    [0, 0.45].forEach(offset => {
      for (let i = 0; i < 4; i++) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        const t = ctx.currentTime + offset + i * 0.08;
        osc.frequency.setValueAtTime(70, t);
        osc.frequency.exponentialRampToValueAtTime(45, t + 0.1);
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.start(t); osc.stop(t + 0.12);
      }
    });
  } catch(e) {}
}

function playDoorSlam() {
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.04));
    }
    const src = ctx.createBufferSource();
    const gain = ctx.createGain();
    src.buffer = buf;
    src.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.7, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    src.start(ctx.currentTime);
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    osc.connect(og); og.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(80, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.3);
    og.gain.setValueAtTime(0.5, ctx.currentTime);
    og.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
  } catch(e) {}
}

function playElevatorDing() {
  // 초인종 딩동 (합성음 유지)
  try {
    const ctx = getAudioCtx();
    [[1109, 0], [880, 0.22]].forEach(([freq, delay]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      const t = ctx.currentTime + delay;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc.start(t); osc.stop(t + 0.8);
    });
  } catch(e) {}
}

function playElevatorArrive() {
  // 엘리베이터 도착음 (WAV 파일)
  try {
    const ctx = getAudioCtx();
    fetch(CDN_AUDIO + 'sfx/sfx_ding.mp3')
      .then(r => r.arrayBuffer())
      .then(ab => ctx.decodeAudioData(ab))
      .then(buf => {
        const src = ctx.createBufferSource();
        const gain = ctx.createGain();
        src.buffer = buf;
        gain.gain.setValueAtTime(0.6, ctx.currentTime);
        src.connect(gain); gain.connect(ctx.destination);
        src.start();
      }).catch(() => {});
  } catch(e) {}
}

function playFootsteps() {
  try {
    const ctx = getAudioCtx();
    [0, 0.28, 0.52, 0.76].forEach((delay) => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.035));
      }
      const src = ctx.createBufferSource();
      const gain = ctx.createGain();
      // 저주파 필터로 낮은 발걸음 느낌
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 180;
      src.buffer = buf;
      src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(0.35, t);
      src.start(t);
    });
  } catch(e) {}
}

let _uiSlashBuffer = null;
async function loadUISlash() {
  if (_uiSlashBuffer) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const res = await fetch(CDN_AUDIO + 'sfx/sfx_slash.mp3');
    const arr = await res.arrayBuffer();
    _uiSlashBuffer = await ctx.decodeAudioData(arr);
  } catch(e) {}
}
loadUISlash();

function playUISlash(reverse) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (reverse && _uiSlashBuffer) {
      // 역재생: 버퍼 샘플 뒤집기
      const buf = _uiSlashBuffer;
      const rev = ctx.createBuffer(buf.numberOfChannels, buf.length, buf.sampleRate);
      for (let c = 0; c < buf.numberOfChannels; c++) {
        const src = buf.getChannelData(c);
        const dst = rev.getChannelData(c);
        for (let i = 0; i < src.length; i++) dst[i] = src[src.length - 1 - i];
      }
      const src2 = ctx.createBufferSource();
      src2.buffer = rev;
      src2.playbackRate.value = 3.0;
      const gain = ctx.createGain(); gain.gain.value = 0.75;
      src2.connect(gain); gain.connect(ctx.destination);
      src2.start();
    } else {
      const a = new Audio(CDN_AUDIO + 'sfx/sfx_slash.mp3');
      a.playbackRate = 3.0; a.volume = 0.75; a.play().catch(()=>{});
    }
  } catch(e) {
    const a = new Audio(CDN_AUDIO + 'sfx/sfx_slash.mp3');
    a.playbackRate = 3.0; a.volume = 0.75; a.play().catch(()=>{});
  }
}

function _playEvidenceBuf(ctx, buf) {
  const src = ctx.createBufferSource();
  const gain = ctx.createGain();
  src.buffer = buf;
  src.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.7, ctx.currentTime + 0.08);
  const duration = buf.duration;
  gain.gain.setValueAtTime(0.7, ctx.currentTime + duration - 0.4);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);
  src.start(ctx.currentTime);
}

function typewriterEffect(html) {
  window.getSelection()?.removeAllRanges();
  const el = document.getElementById('dialogue-text');
  el.innerHTML = '';
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const nodes = Array.from(temp.childNodes);
  let nodeIdx = 0, charIdx = 0, currentSpan = null;
  function step() {
    if (nodeIdx >= nodes.length) {
      clearInterval(typewriterTimer); typewriterTimer = null;

      return;
    }
    const node = nodes[nodeIdx];
    if (node.nodeType === 3) { // 텍스트 노드
      if (charIdx === 0) el.appendChild(document.createTextNode(''));
      const ch = node.textContent[charIdx];
      if (ch === undefined) { nodeIdx++; charIdx = 0; return; }
      el.lastChild.textContent += ch;
      if (ch.trim()) playTypingSound();
      charIdx++;
      if (charIdx >= node.textContent.length) { nodeIdx++; charIdx = 0; }
    } else if (node.nodeType === 1) { // 엘리먼트(span 등)
      if (!currentSpan) { currentSpan = node.cloneNode(false); currentSpan.textContent = ''; el.appendChild(currentSpan); }
      const ch = node.textContent[charIdx];
      if (ch === undefined) { nodeIdx++; charIdx = 0; currentSpan = null; return; }
      currentSpan.textContent += ch;
      if (ch.trim()) playTypingSound();
      charIdx++;
      if (charIdx >= node.textContent.length) { nodeIdx++; charIdx = 0; currentSpan = null; }
    } else { nodeIdx++; }
    // 타이프라이터 도중 키워드 완성 감지
    if (_twHighlightWords.length > 0) {
      const curText = el.innerText || el.textContent;
      _twHighlightWords.forEach(word => {
        if (!_twHighlightFired[word] && curText.includes(word)) {
          _twHighlightFired[word] = true;
          playUnlockAnim([word]);
        }
      });
    }
  }
  typewriterTimer = setInterval(step, typewriterSpeed);
}

const bgm = document.getElementById('bgm');
let bgmMuted = false, bgmStarted = false;
function startBGM() { if (!bgmStarted) { bgm.volume = 0.35; bgm.play().catch(()=>{}); bgmStarted = true; } }
function playBGM(url, volume) {
  const b = document.getElementById('bgm');
  b.src = url;
  b.volume = 0;
  b.play().catch(() => {});
  bgmStarted = true;
  const target = volume || 0.35;
  const step = target / 20;
  const timer = setInterval(() => {
    if (b.volume < target - step) { b.volume = Math.min(target, b.volume + step); }
    else { b.volume = target; clearInterval(timer); }
  }, 80);
}

function fadeBGM(duration) {
  const start = bgm.volume;
  const step = start / (duration / 50);
  const timer = setInterval(() => {
    if (bgm.volume > step) { bgm.volume = Math.max(0, bgm.volume - step); }
    else { bgm.volume = 0; bgm.pause(); clearInterval(timer); }
  }, 50);
}
function toggleVolumePopup() {
  const popup = document.getElementById('volume-popup');
  popup.classList.toggle('open');
  // 팝업 열릴 때 현재 볼륨 슬라이더 반영
  document.getElementById('volume-slider').value = bgm.muted ? 0 : bgm.volume;
}

function setVolume(val) {
  const v = parseFloat(val);
  bgm.volume = v;
  if (v === 0) {
    bgm.muted = true;
    bgmMuted = true;
    document.getElementById('bgm-btn').classList.add('muted');
  } else {
    bgm.muted = false;
    bgmMuted = false;
    document.getElementById('bgm-btn').classList.remove('muted');
  }
}
function toggleBGM() {
  bgmMuted = !bgmMuted;
  bgm.muted = bgmMuted;
  const btn = document.getElementById('bgm-btn');
  if (bgmMuted) { btn.classList.add('muted'); }
  else { btn.classList.remove('muted'); }
}

function renderInvestTopics() {
  _choiceIdx = -1;
  const list = document.getElementById('invest-topic-list');
  if (!list) return;
  list.innerHTML = '';
  INVEST_TOPICS.forEach(topic => {
    if (!_investUnlocked.has(topic.id)) return;
    const btn = document.createElement('button');
    btn.className = 'invest-topic-btn' + (_investDone.has(topic.id) ? ' done' : '');
    btn.textContent = topic.label;
    if (!_investDone.has(topic.id)) {
      btn.onclick = () => selectInvestTopic(topic);
    }
    list.appendChild(btn);
  });
}

function selectInvestTopic(topic) {
  // 버튼 즉시 done 처리
  _investDone.add(topic.id);
  topic.unlocks.forEach(id => _investUnlocked.add(id));

  // 소지품 추가
  if (topic.evidence) {
    addEvidence(topic.evidence[0], topic.evidence[1]);
  }

  // invest-wrap 숨기기
  const investWrap = document.getElementById('invest-wrap');
  investWrap.style.display = 'none';

  // 토픽 씬들을 renderScene 호환 씬으로 변환 후 캐시 등록
  const BG_STU = BG.stu_han;
  const LABEL_STU = '12시 12분 | 강하늘의 자취방 [조사]';
  const charMap = {
    'SH.default':    SH.default,   'SH.bright':     SH.bright,
    'SH.flustered':  SH.flustered, 'SH.sad_slight': SH.sad_slight,
    'SH.sad':        SH.sad,       'SH.sad_deep':   SH.sad_deep,
    'SH.smile':      SH.smile,     'SH.anxious':    SH.anxious,
  };
  const ids = topic.scenes.map((_, i) => `_inv_${topic.id}_${i}`);

  topic.scenes.forEach((sc, i) => {
    const isLast = i === topic.scenes.length - 1;
    const src = charMap[sc.char] || SH.default;
    const sceneObj = {
      bg: BG_STU,
      label: LABEL_STU,
      chars: [{ src, x: 18, y: 0, scale: 1.0, dim: false }],
      speaker: sc.speaker || '',
      text: sc.text || '',
      type: isLast ? 'invest_end' : 'next',
      next: isLast ? null : ids[i + 1],
      _topicId: topic.id,
    };
    if (sc.sfx) sceneObj._investSfx = sc.sfx;
    // renderScene이 참조하는 메인 씬 캐시에 등록
    S[ids[i]] = sceneObj;
  });

  renderScene(ids[0]);
}

const _sceneLabelSet = new Set([
  '발견 당시 상태', '현장 창문 상태', '119 출동 결과', '사건 당일 기상',

]);

function updateCasefile(entryId, label, value, opts) {
  // scene 카테고리 자동 라우팅
  if (entryId === 'victim' && _sceneLabelSet.has(label)) entryId = 'scene';

  const entry = CASEFILE_DATA.find(e => e.id === entryId);
  if (!entry) return;

  // hidden 카테고리 공개
  if (entry.hidden) {
    entry.hidden = false;
    if (!_cfOrder.includes(entryId)) _cfOrder.push(entryId);
  }

  const existing = entry.rows.find(r => r.label === label);
  if (existing) {
    if (existing.value === value) return;
    Object.assign(existing, { value, ...opts });
  } else {
    entry.rows.push({ label, value, ...opts });
  }
  _cfUnread.add(entryId);
  _casefilePendingNotify = true;
  if (document.getElementById('casefile-panel').classList.contains('open')) renderCasefile();
}

// 괄호 텍스트 주황색으로 강조
function cfHighlightParens(text) {
  return String(text).replace(/(\([^)]+\))/g, '<span style="color:rgba(255,180,80,0.75);">$1</span>');
}

function renderCasefile() {
  const list = document.getElementById('casefile-list');
  const cfDragInit = list._cfDragInit; // 초기화 전 보존
  list.innerHTML = '';
  list._cfDragInit = cfDragInit;

  const orderedEntries = _cfOrder
    .map(id => CASEFILE_DATA.find(e => e.id === id))
    .filter(e => e && !e.hidden);

  // 상단 삽입 선
  const topLine = document.createElement('div');
  topLine.className = 'cf-drop-line';
  list.appendChild(topLine);

  orderedEntries.forEach((entry) => {
    const item = document.createElement('div');
    item.className = 'cf-item';
    item.dataset.id = entry.id;
    item.draggable = true;

    item.addEventListener('dragstart', e => {
      list._draggingId = entry.id;
      e.dataTransfer.effectAllowed = 'move';
      // 드래그 유령 이미지: 원본 그대로 (반투명 없음)
      // requestAnimationFrame으로 outline만 살짝 표시
      requestAnimationFrame(() => item.classList.add('dragging-source'));
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging-source');
      list._draggingId = null;
      list.querySelectorAll('.cf-drop-line').forEach(l => l.classList.remove('active'));
      list.querySelectorAll('.cf-item').forEach(it => it.classList.remove('drag-shift-down', 'drag-shift-up'));
    });

    const nameRow = document.createElement('div');
    nameRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;';
    const nameEl = document.createElement('div');
    nameEl.className = 'cf-item-name';
    nameEl.textContent = entry.title;
    if (_cfUnread.has(entry.id)) {
      const badge = document.createElement('span');
      badge.className = 'cf-unread-badge';
      badge.textContent = 'NEW';
      nameEl.appendChild(badge);
    }
    const toggleBtn = document.createElement('span');
    toggleBtn.className = 'cf-toggle-btn';
    toggleBtn.textContent = _cfOpen[entry.id] ? '접기' : '자세히 보기';
    toggleBtn.onclick = () => {
      _cfOpen[entry.id] = !_cfOpen[entry.id];
      if (_cfOpen[entry.id]) _cfUnread.delete(entry.id);
      renderCasefile();
    };
    nameRow.appendChild(nameEl);
    nameRow.appendChild(toggleBtn);
    item.appendChild(nameRow);

    if (_cfOpen[entry.id]) {
      const detail = document.createElement('div');
      detail.className = 'cf-detail';
      entry.rows.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'cf-row';
        let valueHtml = cfHighlightParens(row.value);
        if (row.tooltip) {
          valueHtml = `<span class="cf-tooltip">${valueHtml}<span class="cf-tooltip-text">${row.tooltip}</span></span>`;
        }
        if (row.note) valueHtml += ` <span style="color:rgba(255,180,80,0.75);font-size: 15px;">${row.note}</span>`;
        rowEl.innerHTML = `<span style="color:rgba(255,255,255,0.38);">${row.label}: </span>${valueHtml}`;
        detail.appendChild(rowEl);
        if (row.hasImage && row.imgKey) {
          const imgSrc = EVIDENCE_IMAGES[row.imgKey];
          if (imgSrc) {
            const img = document.createElement('img');
            img.src = imgSrc;
            img.className = 'cf-img';
            img.onclick = () => openLightbox(imgSrc);
            detail.appendChild(img);
          }
        }
      });
      if (entry.incomplete) {
        const inc = document.createElement('div');
        inc.className = 'cf-incomplete';
        inc.textContent = entry.incomplete;
        detail.appendChild(inc);
      }
      item.appendChild(detail);
    }

    list.appendChild(item);

    // 각 아이템 아래 삽입 선
    const line = document.createElement('div');
    line.className = 'cf-drop-line';
    line.dataset.insertAfter = entry.id;
    list.appendChild(line);
  });

  // 드래그 이벤트 위임
  if (!list._cfDragInit) {
    list._cfDragInit = true;

    // 드래그 중인 아이템 높이 기준으로 --cf-shift 설정
    function setShift(dragItemEl) {
      const h = dragItemEl ? dragItemEl.getBoundingClientRect().height : 0;
      list.style.setProperty('--cf-shift', h + 'px');
    }

    // 삽입 위치 결정 — 마우스 y 기준으로 가장 가까운 drop-line 반환
    function getNearestLine(clientY) {
      const lines = [...list.querySelectorAll('.cf-drop-line')];
      let best = null, bestDist = Infinity;
      lines.forEach(line => {
        const rect = line.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        const dist = Math.abs(clientY - mid);
        if (dist < bestDist) { bestDist = dist; best = line; }
      });
      return best;
    }

    list.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move'; // 금지 커서 방지
      if (!list._draggingId) return;

      // 드래그 중인 아이템 높이 → --cf-shift
      const dragEl = list.querySelector(`.cf-item[data-id="${list._draggingId}"]`);
      if (dragEl) list.style.setProperty('--cf-shift', dragEl.getBoundingClientRect().height + 'px');

      // 삽입 위치: 각 cf-item의 중간점 기준
      // 마우스가 아이템 위 절반 → 그 아이템 위에 삽입
      // 마우스가 아이템 아래 절반 → 그 아이템 아래에 삽입
      const items = [...list.querySelectorAll('.cf-item')];
      items.forEach(it => it.classList.remove('drag-shift-down', 'drag-shift-up'));
      list.querySelectorAll('.cf-drop-line').forEach(l => l.classList.remove('active'));

      if (items.length === 0) {
        list.querySelector('.cf-drop-line:not([data-insert-after])')?.classList.add('active');
        return;
      }

      let targetLine = null;

      for (let i = 0; i < items.length; i++) {
        const rect = items[i].getBoundingClientRect();
        const mid = rect.top + rect.height / 2;

        if (e.clientY < mid) {
          // 이 아이템 위에 삽입
          if (i === 0) {
            targetLine = list.querySelector('.cf-drop-line:not([data-insert-after])');
          } else {
            targetLine = list.querySelector(`.cf-drop-line[data-insert-after="${items[i-1].dataset.id}"]`);
          }
          break;
        }

        if (i === items.length - 1) {
          // 마지막 아이템 아래
          targetLine = list.querySelector(`.cf-drop-line[data-insert-after="${items[i].dataset.id}"]`);
        }
      }

      if (targetLine) targetLine.classList.add('active');

      // 비켜나기: targetLine 아래의 아이템들만 shift-down
      if (targetLine) {
        const lineRect = targetLine.getBoundingClientRect();
        items.forEach(it => {
          if (it.dataset.id === list._draggingId) return;
          const itRect = it.getBoundingClientRect();
          if (itRect.top + itRect.height / 2 > lineRect.top) {
            it.classList.add('drag-shift-down');
          }
        });
      }
    });

    list.addEventListener('dragleave', e => {
      if (!list.contains(e.relatedTarget)) {
        list.querySelectorAll('.cf-drop-line').forEach(l => l.classList.remove('active'));
        list.querySelectorAll('.cf-item').forEach(it => it.classList.remove('drag-shift-down', 'drag-shift-up'));
      }
    });

    list.addEventListener('drop', e => {
      e.preventDefault();
      list.querySelectorAll('.cf-item').forEach(it => it.classList.remove('drag-shift-down', 'drag-shift-up'));
      if (!list._draggingId) return;

      const activeLine = list.querySelector('.cf-drop-line.active');
      list.querySelectorAll('.cf-drop-line').forEach(l => l.classList.remove('active'));
      if (!activeLine) return;

      const fromId = list._draggingId;
      const fi = _cfOrder.indexOf(fromId);
      if (fi < 0) return;

      // insertAfter: 이 아이디 뒤에 삽입. undefined이면 맨 앞
      const insertAfter = activeLine.dataset.insertAfter;

      // 제자리 감지
      if (insertAfter === fromId) return;
      const prevId = fi > 0 ? _cfOrder[fi - 1] : undefined;
      if (insertAfter === prevId) return;
      if (!insertAfter && fi === 0) return;

      // splice 전에 insertAfter 인덱스 확정
      const tiBeforeSplice = insertAfter ? _cfOrder.indexOf(insertAfter) : -1;

      _cfOrder.splice(fi, 1); // fromId 제거

      if (!insertAfter) {
        _cfOrder.unshift(fromId); // 맨 앞
      } else {
        // splice 후 insertAfter 위치가 fi보다 뒤였으면 1 감소
        const ti = tiBeforeSplice > fi ? tiBeforeSplice - 1 : tiBeforeSplice;
        _cfOrder.splice(ti + 1, 0, fromId);
      }

      renderCasefile();
    });
  }
}

function doSaveFile() {
  const badTypes = ['wip', 'restart', 'chapter_title'];
  let saveSceneId = currentId;
  if (!saveSceneId || !S[saveSceneId] || badTypes.includes(S[saveSceneId].type)) {
    saveSceneId = [...sceneHistory].reverse().find(id => S[id] && !badTypes.includes(S[id].type)) || 'prologue';
  }
  const saveData = {
    version: 1,
    sceneId: saveSceneId,
    evidence: evidence,
    evidenceOrder: evidenceOrder,
    chatLog: chatLog,
  };
  const json = JSON.stringify(saveData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `이상현상관리본부_세이브.json`;
  a.click();
  URL.revokeObjectURL(url);
  setTimeout(() => { showWorkInProgress(); }, 300);
}

function loadSaveFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.sceneId || !S[data.sceneId]) { alert('올바르지 않은 세이브 파일입니다.'); return; }
        // 상태 복원
        Object.keys(evidence).forEach(k => delete evidence[k]);
        evidenceOrder.length = 0;
        chatLog.length = 0;
        Object.assign(evidence, data.evidence || {});
        (data.evidenceOrder || []).forEach(k => evidenceOrder.push(k));
        (data.chatLog || []).forEach(e => chatLog.push(e));
        document.getElementById('ev-count').textContent = evidenceOrder.length;
        // 탐정 등장 씬(s82)부터 시작
        isLoadedSave = true;
        bgmStarted = true;
        // 신문/조사 상태 초기화
        if (typeof interrogateDone !== 'undefined') Object.keys(interrogateDone).forEach(k => delete interrogateDone[k]);
        if (typeof _unlockedTopics !== 'undefined') { _unlockedTopics.clear(); _unlockedTopics.add('identity'); }
        if (typeof _investDone !== 'undefined') _investDone.clear();
        if (typeof _investUnlocked !== 'undefined') _investUnlocked = new Set(['inv_window']);
        if (typeof _investSceneQueue !== 'undefined') _investSceneQueue = [];
        if (typeof _investNextScene !== 'undefined') _investNextScene = null;
        startGame('s82');
      } catch(err) { alert('세이브 파일을 불러오는 데 실패했습니다.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// 재질문 패턴 (3종 순환) — SH/RI 선언 이후로 이동

function startInterrogate() {
  // 수첩 비우기
  Object.keys(evidence).forEach(k => delete evidence[k]);
  evidenceOrder.length = 0;
  document.getElementById('ev-count').textContent = 0;
  // 하이라이트 초기 off (신문 UI 진입 후 on)
  highlightEnabled = false;
  interrogateDone = {};
  // right_evidence 브금 재생
  playBGM(CDN_AUDIO + 'BGM/bgm_int.mp3');

  // SVG 지그재그 선 생성 — 90도 꺾임 (수평·수직 교대)
  const vh = window.innerHeight;
  const zigzag = 18; // 수평 이동 폭(px)
  const step = 40;   // 각 단계 높이(px)
  const pts = [];
  // 시작점
  pts.push(`0,0`);
  for (let y = step; y <= vh + step; y += step) {
    const x = (Math.floor(y / step) % 2 === 0) ? 0 : zigzag;
    // 꺾임: 수평 이동 후 수직 이동 (꺾이는 각도 90도)
    const prevX = (Math.floor((y - step) / step) % 2 === 0) ? 0 : zigzag;
    pts.push(`${x},${y - step}`); // 수평 구간 끝 (같은 y에서 x 전환)
    pts.push(`${x},${y}`);
  }
  const poly = document.getElementById('interrogate-divider-poly');
  poly.setAttribute('points', pts.join(' '));
  // 90도 꺾임: 각 스텝 = 수평(zigzag) + 수직(step)
  const segLen = zigzag + step;
  const totalLen = Math.round(segLen * (vh / step) * 1.2);
  poly.style.strokeDasharray = totalLen;
  poly.style.strokeDashoffset = totalLen;
  poly.style.animation = 'none';
  void poly.offsetWidth;
  poly.style.animation = `dividerDrop 1.1s cubic-bezier(0.22,1,0.36,1) forwards`;

  const div = document.getElementById('interrogate-divider');
  div.classList.add('active');

  // 신문 시작 텍스트: 0.5s 후 scale-up 등장 → 1.8s 후 fade-out
  const textEl = document.getElementById('interrogate-start-text');
  const span   = textEl.querySelector('span');
  textEl.classList.add('active');
  span.style.animation = 'none';
  void span.offsetWidth;
  span.style.animation = 'interrogateTextIn 1.8s cubic-bezier(0.22,1,0.36,1) forwards';
  setTimeout(() => {
    span.style.animation = 'interrogateTextOut 0.8s ease forwards';
    setTimeout(() => { textEl.classList.remove('active'); }, 800);
  }, 2400);

  // 신문 UI: 텍스트 완전히 사라진 후(3.3s) 슬라이드인
  setTimeout(() => {
    // 초기 토픽 해금 — 첫 진입 시 'identity'만 열림
    _unlockedTopics = new Set(['identity']);
    interrogateDone = {};
    _prevUnlockedTopics = new Set();
    renderInterrogateTopics(false);

    const wrap = document.getElementById('interrogate-wrap');
    wrap.style.animation = 'none';
    wrap.style.display = 'flex';
    void wrap.offsetWidth;
    wrap.style.animation = 'interrogateWrapIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards';
    document.getElementById('continue-after-interrogate').style.display = 'none';
    highlightEnabled = true;
  }, 3300);
}

const _evOpen = {};

function onEvidenceDetail(name) {
  _evOpen[name] = !_evOpen[name];
  const item = document.querySelector(`.ev-item[data-key="${CSS.escape(name)}"]`);
  if (!item) return;
  const existing = item.querySelector('.ev-detail');
  const btn = item.querySelector('.ev-detail-btn');
  if (existing) {
    existing.remove();
    btn.textContent = '자세히 보기';
  } else {
    const imgSrc = EVIDENCE_IMAGES[name];
    if (!imgSrc) return;
    const detail = document.createElement('div');
    detail.className = 'ev-detail';
    detail.style.cssText = 'margin-top:10px;border-top:0.5px solid rgba(255,255,255,0.07);padding-top:10px;';
    const img = document.createElement('img');
    img.src = imgSrc;
    img.style.cssText = 'width:100%;max-width:320px;border-radius:11px;display:block;cursor:zoom-in;';
    img.onclick = () => openLightbox(imgSrc);
    detail.appendChild(img);
    item.appendChild(detail);
    btn.textContent = '접기';
  }
}

let evidenceOrder = [];

function addEvidence(name, desc) {
  if (!evidence[name]) {
    evidence[name] = desc;
    evidenceOrder.push(name);
    document.getElementById('ev-count').textContent = evidenceOrder.length;
    playEvidenceFound();
    // 수첩 패널 열려있으면 실시간 반영
    if (document.getElementById('evidence-panel').classList.contains('open')) {
      renderEvidence();
    }
    return true;
  }
  return false;
}

function addEvidenceSilent(name, desc) {
  if (!evidence[name]) {
    evidence[name] = desc;
    evidenceOrder.push(name);
    document.getElementById('ev-count').textContent = evidenceOrder.length;
    if (document.getElementById('evidence-panel').classList.contains('open')) {
      renderEvidence();
    }
    return true;
  }
  return false;
}

function renderEvidence() {
  const list = document.getElementById('evidence-list');
  if (evidenceOrder.length === 0) {
    list.innerHTML = '<div class="ev-empty">아직 소지한 물품이 없습니다.</div>';
    return;
  }
  list.innerHTML = '';
  let _evDraggingKey = null;

  // 상단 삽입 선
  const topLine = document.createElement('div');
  topLine.className = 'cf-drop-line';
  list.appendChild(topLine);

  evidenceOrder.forEach(k => {
    const item = document.createElement('div');
    item.className = 'ev-item';
    item.draggable = true;
    item.dataset.key = k;

    const nameEl = document.createElement('div');
    nameEl.className = 'ev-item-name';
    nameEl.textContent = k;
    const descEl = document.createElement('div');
    descEl.className = 'ev-item-desc';
    descEl.textContent = evidence[k];
    const detailRow = document.createElement('div');
    detailRow.style.cssText = 'text-align:right;margin-top:6px;';
    const detailBtn = document.createElement('span');
    detailBtn.className = 'ev-detail-btn';
    detailBtn.textContent = _evOpen[k] ? '접기' : '자세히 보기';
    detailBtn.style.cssText = 'font-size: 15px;color:#a89ccc;text-decoration:underline;cursor:pointer;user-select:none;';
    detailBtn.onclick = () => onEvidenceDetail(k);
    detailRow.appendChild(detailBtn);
    item.appendChild(nameEl);
    item.appendChild(descEl);
    item.appendChild(detailRow);

    // 열린 상태 복원
    if (_evOpen[k]) {
      const imgSrc = EVIDENCE_IMAGES[k];
      if (imgSrc) {
        const detail = document.createElement('div');
        detail.className = 'ev-detail';
        detail.style.cssText = 'margin-top:10px;border-top:0.5px solid rgba(255,255,255,0.07);padding-top:10px;';
        const img = document.createElement('img');
        img.src = imgSrc;
        img.style.cssText = 'width:100%;max-width:320px;border-radius:11px;display:block;cursor:zoom-in;';
        img.onclick = () => openLightbox(imgSrc);
        detail.appendChild(img);
        item.appendChild(detail);
      }
    }

    item.addEventListener('dragstart', e => {
      _evDraggingKey = k;
      item.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.style.opacity = '';
      _evDraggingKey = null;
      list.querySelectorAll('.cf-drop-line').forEach(l => l.classList.remove('active'));
    });

    list.appendChild(item);

    const line = document.createElement('div');
    line.className = 'cf-drop-line';
    line.dataset.insertAfter = k;
    list.appendChild(line);
  });

  // 드래그 이벤트 위임
  list.addEventListener('dragover', e => {
    e.preventDefault();
    if (!_evDraggingKey) return;
    list.querySelectorAll('.cf-drop-line').forEach(l => l.classList.remove('active'));
    const items = [...list.querySelectorAll('.ev-item')];
    items.forEach(it => it.classList.remove('drag-shift-down', 'drag-shift-up'));

    if (items.length === 0) {
      list.querySelector('.cf-drop-line:not([data-insert-after])')?.classList.add('active');
      return;
    }
    const firstRect = items[0].getBoundingClientRect();
    if (e.clientY < firstRect.top + firstRect.height / 2) {
      list.querySelector('.cf-drop-line:not([data-insert-after])')?.classList.add('active');
      items.forEach(it => { if (it.dataset.key !== _evDraggingKey) it.classList.add('drag-shift-down'); });
      return;
    }
    for (let i = 0; i < items.length; i++) {
      const rect = items[i].getBoundingClientRect();
      const nextRect = items[i + 1]?.getBoundingClientRect();
      const bottomMid = nextRect ? (rect.bottom + nextRect.top) / 2 : rect.bottom + 20;
      if (e.clientY <= bottomMid || i === items.length - 1) {
        const afterKey = items[i].dataset.key;
        list.querySelector(`.cf-drop-line[data-insert-after="${afterKey}"]`)?.classList.add('active');
        items.forEach((it, j) => {
          if (it.dataset.key === _evDraggingKey) return;
          if (j <= i) it.classList.remove('drag-shift-down', 'drag-shift-up');
          else it.classList.add('drag-shift-down');
        });
        return;
      }
    }
  });
  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) {
      list.querySelectorAll('.cf-drop-line').forEach(l => l.classList.remove('active'));
      list.querySelectorAll('.ev-item').forEach(it => it.classList.remove('drag-shift-down', 'drag-shift-up'));
    }
  });
  list.addEventListener('drop', e => {
    e.preventDefault();
    list.querySelectorAll('.ev-item').forEach(it => it.classList.remove('drag-shift-down', 'drag-shift-up'));
    if (!_evDraggingKey) return;
    const activeLine = list.querySelector('.cf-drop-line.active');
    list.querySelectorAll('.cf-drop-line').forEach(l => l.classList.remove('active'));
    if (!activeLine) return;
    const fromKey = _evDraggingKey;
    const fi = evidenceOrder.indexOf(fromKey);
    if (fi < 0) return;
    const insertAfter = activeLine.dataset.insertAfter;
    // 제자리 드롭 감지
    const prevKey = fi > 0 ? evidenceOrder[fi - 1] : null;
    if (insertAfter === prevKey || (!insertAfter && fi === 0)) return;
    if (insertAfter === fromKey) return;
    const ti = insertAfter ? evidenceOrder.indexOf(insertAfter) : -1;
    evidenceOrder.splice(fi, 1);
    if (!insertAfter) {
      evidenceOrder.unshift(fromKey);
    } else {
      evidenceOrder.splice(ti, 0, fromKey);
    }
    renderEvidence();
  });
}

function skipToInvest() {
  // 진행 중인 타이프라이터, floatBtn 콜백, 조사 씬 큐 전부 정리
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  const floatBtn = document.getElementById('continue-btn-float');
  if (floatBtn) { floatBtn._cb = null; floatBtn.className = 'hidden'; }
  if (typeof _investSceneQueue !== 'undefined') _investSceneQueue = [];
  // 열린 패널 닫기
  ['casefile-panel','evidence-panel','log-panel'].forEach(pid => {
    const p = document.getElementById(pid);
    if (p && p.classList.contains('open')) p.classList.remove('open');
  });
  let id = currentId;
  const visited = new Set([id]);
  let s = S[id];

  // invest_room 이후 씬이면 chapter1_title로 건너뜀
  const postInvestIds = new Set();
  let cur = 's52';
  for (let i = 0; i < 200; i++) {
    if (!cur || !S[cur]) break;
    postInvestIds.add(cur);
    if (cur === 'chapter1_title') break;
    cur = S[cur].next;
  }
  // chapter1_title 이후(2장 시작) 구간이면 s164(신문)로 건너뜀
  const post2Ids = new Set();
  let cur2 = 's82';
  for (let i = 0; i < 300; i++) {
    if (!cur2 || !S[cur2]) break;
    post2Ids.add(cur2);
    if (cur2 === 's164') break;
    if (S[cur2].type === 'interrogate') break;
    cur2 = S[cur2].next;
  }
  // 공통 스킵 버튼 비활성화 헬퍼
  function disableSkip() {
    const sb = document.getElementById('skip-btn');
    if (sb) { sb.disabled = true; sb.style.color = 'rgba(255,255,255,0.3)'; sb.style.opacity = '0.5'; }
  }

  // 신문 상태 초기화 헬퍼
  function resetInterrogateState() {
    if (typeof interrogateDone !== 'undefined') Object.keys(interrogateDone).forEach(k => delete interrogateDone[k]);
    if (typeof _unlockedTopics !== 'undefined') { _unlockedTopics.clear(); _unlockedTopics.add('identity'); }
    if (typeof _currentIqTopicId !== 'undefined') _currentIqTopicId = null;
  }

  // 조사 상태 초기화 헬퍼
  function resetInvestState() {
    if (typeof _investDone !== 'undefined') _investDone.clear();
    if (typeof _investUnlocked !== 'undefined') _investUnlocked = new Set(['inv_window']);
    if (typeof _investSceneQueue !== 'undefined') _investSceneQueue = [];
    if (typeof _investNextScene !== 'undefined') _investNextScene = null;
  }

  if (post2Ids.has(currentId)) {
    chatLog.length = 0;
    const seg2Start = 's160', seg2End = 's164';
    let sid = seg2Start;
    const sv = new Set();
    while (sid && S[sid] && sid !== seg2End && !sv.has(sid)) {
      sv.add(sid);
      chatLog.push({ speaker: S[sid].speaker, text: S[sid].text });
      sid = S[sid].next;
    }
    setCasefileMode(true);
    resetInterrogateState();
    resetInvestState();
    isTransitioning = false;
    renderScene('s164');
    disableSkip();
    return;
  }

  if (postInvestIds.has(currentId)) {
    let tid = currentId;
    const tv = new Set([tid]);
    while (tid && S[tid] && S[tid].type === 'next' && S[tid].next && !tv.has(S[tid].next)) {
      tid = S[tid].next;
      tv.add(tid);
      if (S[tid]) chatLog.push({ speaker: S[tid].speaker, text: S[tid].text });
      if (tid === 'chapter1_title') break;
    }
    resetInvestState();
    isTransitioning = false;
    renderScene('chapter1_title');
    disableSkip();
    return;
  }

  while (s && s.type === 'next' && s.next && s.next !== 'invest_room' && !visited.has(s.next)) {
    id = s.next;
    visited.add(id);
    s = S[id];
    if (s) chatLog.push({ speaker: s.speaker, text: s.text });
    if (s && (s.type === 'investigate' || s.type === 'restart')) break;
  }
  resetInvestState();
  isTransitioning = false;
  renderScene('invest_room');
  disableSkip();
}

function renderLog() {
  const list = document.getElementById('log-list');
  if (chatLog.length === 0) { list.innerHTML = '<div style="font-size: 18px;color:rgba(255,255,255,0.27);padding:11px 0">아직 대화 내용이 없습니다.</div>'; return; }
  list.innerHTML = chatLog.map(entry => {
    const isNarration = !entry.speaker;
    const speakerHtml = `<div class="log-speaker${isNarration ? ' narration' : ''}" style="${isNarration ? '' : `color:${SPEAKER_COLORS[entry.speaker] || '#a89ccc'}`}">${isNarration ? '나레이션' : entry.speaker}</div>`;
    const _logBaseText = highlightEnabled ? highlightText(entry.text) : entry.text;
    const _logText = applyIqHighlightStr(_logBaseText, entry.highlight || []);
    return `<div class="log-entry">${speakerHtml}<div class="log-text">${_logText}</div></div>`;
  }).join('');
  setTimeout(() => { list.scrollTop = list.scrollHeight; }, 0);
}

const SPEAKER_SPRITE_MAP = {
  '백서현':'seo','강하늘':'han','홍세빈':'seb',
  '최바름':'rig','성 형사':'smo','빈서(?)':'pat','경찰1':'shd','임보라':'bor',
};

// 이전 씬에서 각 캐릭터(스프라이트 키워드)가 있었던 x% 위치를 기억
const _prevCharX = {};

// src 경로에서 캐릭터 식별 키워드 추출
function _charKey(src) {
  if (!src) return null;
  for (const kw of ['seo','han','seb','rig','smo','pat','shd','bor'])
    if (src.includes(kw)) return kw;
  return null;
}

function buildCharLayer(chars, speaker, keepAbsent) {
  const layer = document.getElementById('char-layer');
  const list  = chars || [];
  const hasMultiple = list.filter(c => c.src && !c.dim).length >= 2;
  const isNarration = !speaker;
  const speakerKw   = speaker ? (SPEAKER_SPRITE_MAP[speaker] || '') : '';

  const newKeys = new Set(list.map(c => _charKey(c.src)).filter(Boolean));

  // 기존 wrap 맵
  const oldWraps = [...layer.querySelectorAll('.char-sprite[data-key]')];
  const prevWrapMap = {};
  oldWraps.forEach(w => { prevWrapMap[w.dataset.key] = w; });

  // 이번 씬에 없는 캐릭터 처리
  oldWraps.forEach(w => {
    if (!newKeys.has(w.dataset.key)) {
      if (keepAbsent) {
        // dim 상태로 유지 (src 변경 없음)
        w.className = 'char-sprite dim';
        w.style.filter = '';
        w.style.zIndex = 1;
      } else {
        w.remove();
      }
    }
  });

  list.forEach((c) => {
    const xPct  = (c.x     !== undefined) ? c.x     : (c.src && c.src.includes('seohyun') ? 18 : 82);
    const yPct  = (c.y     !== undefined) ? c.y     : 0;
    const scale = (c.scale !== undefined) ? c.scale : 1.0;
    const flip  = !!c.flip;
    const key   = _charKey(c.src);

    const isSpeaker = speakerKw && c.src && c.src.includes(speakerKw);
    const zIdx = c.dim ? 1 : (isSpeaker ? 5 : 2);

    let filterVal = '';
    if (!c.dim) {
      if (isNarration) filterVal = 'brightness(0.55) saturate(0.8)';
      else if (hasMultiple && speaker && !isSpeaker) filterVal = 'brightness(0.55) saturate(0.8)';
      else filterVal = 'brightness(1.05)';
    }

    const prevWrap = key ? prevWrapMap[key] : null;
    const isNew    = !prevWrap || !prevWrap.isConnected;

    if (!isNew) {
      // ── 기존 인물: DOM 재사용 ──
      const wrap  = prevWrap;
      const inner = wrap.querySelector('div');
      const img   = inner ? inner.querySelector('img') : null;

      // 진행 중인 transition/animation 즉시 확정 후 상태 리셋
      wrap.style.transition = 'none';
      wrap.style.opacity    = '1';
      wrap.className = 'char-sprite' + (c.dim ? ' dim' : ' active') + (c.silhouette ? ' silhouette' : '');
      wrap.style.zIndex  = zIdx;
      wrap.style.filter  = filterVal;
      if (inner) {
        inner.style.transform = flip ? 'scaleX(-1)' : '';
        // entering animation 완전 제거 — reflow로 상태 초기화
        inner.classList.remove('char-entering-left', 'char-entering-right');
        void inner.offsetWidth;
      }

      // 표정(src) 교체 — 즉시 교체 (fade는 깜빡임처럼 보임)
      if (img && c.src) {
        const newFile = c.src.split('/').pop();
        const curFile = img.src.split('/').pop();
        if (newFile !== curFile) {
          img.src = c.src;
        }
      }

      // 위치 이동 — 다음 프레임에 transition 켜고 이동
      const curX = parseFloat(wrap.style.left);
      if (Math.abs(curX - xPct) > 0.5) {
        // reflow 강제 후 transition 적용
        void wrap.offsetWidth;
        wrap.style.transition = 'left 0.5s cubic-bezier(0.22,1,0.36,1), filter 0.3s';
        wrap.style.left = xPct + '%';
      } else {
        wrap.style.transition = 'filter 0.3s';
      }

      if (c.anim && inner) {
        setTimeout(() => {
          if (!inner.isConnected) return;
          inner.classList.add('anim-' + c.anim);
          inner.addEventListener('animationend', () => inner.classList.remove('anim-' + c.anim), {once:true});
        }, 540);
      }

    } else {
      // ── 신규 인물: CSS animation으로 슬라이드인 (rAF 없음) ──
      const wrap = document.createElement('div');
      wrap.className = 'char-sprite' + (c.dim ? ' dim' : ' active') + (c.silhouette ? ' silhouette' : '');
      if (key) wrap.dataset.key = key;
      wrap.style.cssText = `left:${xPct}%;bottom:${yPct}%;transform:translateX(-50%) scale(${scale});transform-origin:bottom center;z-index:${zIdx};`;
      if (filterVal) wrap.style.filter = filterVal;

      const inner = document.createElement('div');
      inner.style.cssText = 'display:flex;align-items:flex-end;transform-origin:bottom center;';
      if (flip) inner.style.transform = 'scaleX(-1)';

      // 슬라이드인 방향: 목표가 왼쪽(< 50%)이면 왼쪽에서, 오른쪽이면 오른쪽에서
      inner.classList.add(xPct < 50 ? 'char-entering-left' : 'char-entering-right');

      if (c.src) {
        const img = document.createElement('img');
        img.src = c.src; img.alt = '';
        inner.appendChild(img);
      }
      wrap.appendChild(inner);
      layer.appendChild(wrap);

      if (c.anim) {
        setTimeout(() => {
          if (!inner.isConnected) return;
          inner.classList.add('anim-' + c.anim);
          inner.addEventListener('animationend', () => inner.classList.remove('anim-' + c.anim), {once:true});
        }, 520);
      }
    }

    if (key) _prevCharX[key] = xPct;
  });

  for (const k of Object.keys(_prevCharX)) {
    if (!newKeys.has(k)) delete _prevCharX[k];
  }
}

// 텍스트가 대화창 두 줄을 넘는지 측정
function measureLineCount(text) {
  const el = document.getElementById('dialogue-text');
  const clone = el.cloneNode(false);
  clone.style.cssText = el.style.cssText;
  clone.style.height = 'auto';
  clone.style.overflow = 'visible';
  clone.style.position = 'absolute';
  clone.style.visibility = 'hidden';
  clone.innerHTML = highlightText(text);
  document.body.appendChild(clone);
  const lineHeight = 19 * 1.75;
  const lines = Math.round(clone.offsetHeight / lineHeight);
  document.body.removeChild(clone);
  return lines;
}

// 마침표/느낌표/물음표 기준으로 두 줄 안에 들어오는 최대 구간 찾기
function splitTextAtSentence(text) {
  const endings = /[.!?。…"]+/g;
  let lastGoodIdx = -1;
  let match;
  while ((match = endings.exec(text)) !== null) {
    const candidate = text.slice(0, match.index + match[0].length).trim();
    if (measureLineCount(candidate) <= 2) {
      lastGoodIdx = match.index + match[0].length;
    } else {
      break;
    }
  }
  if (lastGoodIdx === -1) return null; // 분할 불필요 or 첫 문장부터 넘침
  const first = text.slice(0, lastGoodIdx).trim();
  const rest  = text.slice(lastGoodIdx).trim();
  return rest.length > 0 ? { first, rest } : null;
}

// 런타임 씬 분할 캐시
const splitCache = {};

function getSplitScenes(id, s) {
  if (splitCache[id]) return splitCache[id];
  if (s.type !== 'next' && s.type !== 'investigate') return null;
  if (measureLineCount(s.text) <= 2) return null;
  const split = splitTextAtSentence(s.text);
  if (!split) return null;
  const tempId = id + '__cont';
  const cont = { ...s, text: split.rest, _splitFrom: id };
  splitCache[id] = { first: split.first, contId: tempId, cont };
  return splitCache[id];
}

function renderScene(id, isBack) {
  // 런타임 분할 씬 처리
  if (id.includes('__cont')) {
    const parts = id.split('__cont');
    const baseId = parts[0];
    const cached = splitCache[baseId];
    if (cached) {
      const s = cached.cont;
      _renderSceneData(id, s, isBack);
      return;
    }
  }
  // 신문 답변 씬 처리
  if (id.startsWith('iq_')) {
    const s = getIqScene(id);
    if (s) { _renderSceneData(id, s, isBack); return; }
  }
  const s = S[id];
  if (!s) return;
  _renderSceneData(id, s, isBack);
}

function _renderSceneData(id, s, isBack) {
  if (!isBack) sceneHistory.push(id);
  currentId = id;
  vagueIdx = 0; guideIdx = 0;

  // 조사 파트가 아닌 씬으로 진입하면 하이라이트 끔, 조사 파트면 켬
  if (s.type === 'investigate' || s.type === 'interrogate') highlightEnabled = true;
  else if (!s.type || !s.type.startsWith('iq_')) highlightEnabled = false;

  const bgLayer = document.getElementById('bg-layer');
  const TRANSITION_BGS = [BG.ele, BG.cor, BG.stu_han];
  const needsDelay = currentBg !== s.bg && TRANSITION_BGS.includes(currentBg) && TRANSITION_BGS.includes(s.bg);

  const applyContent = () => {
    if (s.onEnter) s.onEnter();
    if (s.onShow) s.onShow();
    // 배경 줌 처리
    // bgZoom: true — 확대, bgZoomOut: true — 복귀, bgZoomOrigin: 'X% Y%' — 기준점
    //
    // [bora_bedroom / bora_room 좌표, 이미지 2816x1536]
    // 이젤(거치대):            bgZoomOrigin: '62.0% 83.4%'
    // 흉기(부러진 이젤 다리):  bgZoomOrigin: '77.8% 82.7%'
    // 이젤+흉기 중간:          bgZoomOrigin: '70.0% 83.1%'  ← 최바름/성형사 이젤·흉기 언급 씬
    // 책상 위 휴대폰:          bgZoomOrigin: '48.9% 57.4%'
    // 베란다(시신 위치):        bgZoomOrigin: '26.4% 63.7%'
    // 베란다 밖 창문 세 개:    bgZoomOrigin: '20.6% 40.3%'
    const bgLayer = document.getElementById('bg-layer');
    if (!s.bgZoom && !s.bgZoomOut) {
      // bgZoom 씬이 아니면 배경 확대 리셋
      document.getElementById('bg-layer').style.transform = 'translate(0px, 0px) scale(1)';
    }
    if (s.bgZoom) {
      if (s.bgZoomOrigin) {
        const parts = s.bgZoomOrigin.split(' ');
        const ox = parseFloat(parts[0]) / 100;
        const oy = parseFloat(parts[1]) / 100;

        const vw = window.innerWidth;
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const imgRatio = 2816 / 1536;
        const vpRatio  = vw / vh;
        let imgW, imgH;
        if (vpRatio >= imgRatio) { imgW = vw; imgH = vw / imgRatio; }
        else                     { imgH = vh; imgW = vh * imgRatio; }
        const offX = (vw - imgW) / 2;
        const offY = (vh - imgH) / 2;

        const tpx = offX + ox * imgW;
        const tpy = offY + oy * imgH;
        const cx = vw / 2, cy = vh / 2;
        const txPx = cx - tpx;
        const tyPx = cy - tpy;

        // 빈공간 방지 최소 scale:
        // finalTx = cx + sc*(txPx - cx) >= 0  →  sc*(cx - txPx) <= cx  →  sc <= cx/(cx-txPx) ... 아니고
        // finalTx <= 0 필요: cx + sc*(txPx-cx) <= 0
        //   sc >= cx/(cx-txPx)  (txPx < cx일 때)
        // finalTx + imgW*sc >= vw: cx + sc*(txPx-cx) + imgW*sc >= vw
        //   sc*(imgW - cx + txPx) >= vw - cx  →  sc >= (vw-cx)/(imgW-cx+txPx)
        const scL = (cx - txPx) > 0 ? cx / (cx - txPx) : 1;
        const scR = (imgW - cx + txPx) > 0 ? cx / (imgW - cx + txPx) : 1;
        const scT = (cy - tyPx) > 0 ? cy / (cy - tyPx) : 1;
        const scB = (imgH - cy + tyPx) > 0 ? cy / (imgH - cy + tyPx) : 1;
        let sc = s.bgZoomScale || Math.ceil(Math.max(scL, scR, scT, scB, 1.5) * 10) / 10;

        const finalTx = cx + sc * (txPx - cx);
        const finalTy = cy + sc * (tyPx - cy);
        bgLayer.style.transform = `translate(${finalTx}px, ${finalTy}px) scale(${sc})`;
      } else {
        const sc = s.bgZoomScale || 1.5;
        const vw2 = window.innerWidth, vh2 = window.innerHeight;
        const ftx = vw2/2 * (1 - sc);
        const fty = vh2/2 * (1 - sc);
        bgLayer.style.transform = `translate(${ftx}px, ${fty}px) scale(${sc})`;
      }
    } else if (s.bgZoomOut) {
      bgLayer.style.transform = 'translate(0px, 0px) scale(1)';
    }
    document.getElementById('scene-label').textContent = s.label;

    // 대화창 슬라이드업 애니메이션
    const textbox = document.getElementById('textbox');
    textbox.classList.remove('slide-in');
    void textbox.offsetWidth;
    textbox.classList.add('slide-in');

    const spEl = document.getElementById('speaker-name');
    const badge = document.getElementById('speaker-badge');
    const badgeText = document.getElementById('speaker-badge-text');

    if (!s.speaker) {

      badgeText.style.color = SPEAKER_COLORS[s.speaker] || '#a89ccc';

    }
    spEl.textContent = '';

    // 텍스트 분할 확인
    const baseS = S[id] || s;
    const split = (s.type === 'next' || s.type === 'investigate') && !s._splitFrom ? getSplitScenes(id, s) : null;
    const displayText = split ? split.first : s.text;

    // 속마음(monologue) 씬 스타일 처리

    const _iqDisplayText = applyIqHighlightStr(

    typewriterSpeed = s.typeSpeed || 28;
    // 하이라이트 키워드가 있으면 타이프라이터 도중 감지

    // 효과음 재생
    const _activeSfx = s.sfx || s._investSfx;
    if (_activeSfx) {
      const sfxMap = { vibration: playPhoneVibration, door: playDoorSlam, elevator: playElevatorDing, elevator_arrive: playElevatorArrive, footsteps: playFootsteps, evidence: playEvidenceFound, washmachine: playWashmachine, door_handle: playDoorHandle, door_slam: playDoorSlam2, paintbrush: playPaintbrush, elevator_move: playElevatorMove, stop_elev_move: stopElevatorMove };
      const fn = sfxMap[_activeSfx];
      if (fn) setTimeout(fn, 200);

    const choices = document.getElementById('choices');
    const investWrap = document.getElementById('invest-wrap');

    const floatBtn = document.getElementById('continue-btn-float');
    choices.innerHTML = '';
    investWrap.style.display = 'none';
    if (investResp) investResp.style.display = 'none';
    continueBtn.style.display = 'none';
    floatBtn.className = 'hidden';
    floatBtn._cb = null;
    // 씬 전환 시 열린 슬라이더 패널 자동 닫기
    ['casefile-panel','evidence-panel','log-panel'].forEach(id => {
      document.getElementById(id).classList.remove('open');

    const nextId = split ? split.contId : s.next;
